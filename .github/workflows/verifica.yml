name: verifica-integridade
on:
  push:
    branches: [ main ]
jobs:
  verifica:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verificador de integridade (sintaxe + espelhos + features)
        run: node scripts/verifica.js
