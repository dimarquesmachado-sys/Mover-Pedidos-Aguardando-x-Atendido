<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard · Girassol</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--line:#334155;--tx:#e2e8f0;--mut:#94a3b8;--ac:#2563eb;--ok:#10b981;--warn:#f59e0b;--bad:#ef4444}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);font:14px/1.45 system-ui,Segoe UI,Roboto,sans-serif;padding:14px}
  a{color:#60a5fa;text-decoration:none}
  .wrap{max-width:1100px;margin:0 auto}
  h1{font-size:19px;margin:0 0 2px}
  .sub{color:var(--mut);font-size:12px;margin-bottom:14px}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
  .chip{background:var(--card);border:1px solid var(--line);color:var(--mut);border-radius:999px;padding:7px 14px;font-size:13px;cursor:pointer}
  .chip.on{border-color:var(--ac);color:var(--tx);background:#13243f}
  .cards{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
  .cardk{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;flex:1;min-width:140px}
  .cardk .v{font-size:22px;font-weight:800}
  .cardk .l{font-size:12px;color:var(--mut)}
  .sec{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin:12px 0}
  .sec h2{font-size:15px;margin:0 0 10px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{color:var(--mut);text-align:left;font-weight:600;padding:6px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
  td{padding:6px 8px;border-bottom:1px solid #24324a;vertical-align:top}
  tr:last-child td{border-bottom:none}
  .num{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
  .bar{background:#24324a;border-radius:4px;height:8px;overflow:hidden}
  .bar>i{display:block;height:8px;background:var(--ac)}
  .bar>i.g{background:var(--ok)}
  .mut{color:var(--mut)}.ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}
  .tabs{display:flex;gap:6px;margin-bottom:10px}
  .tabs .chip.on{border-color:var(--ok);background:#0c2a20;color:var(--tx)}
  .diaschart{display:flex;align-items:flex-end;gap:3px;height:120px;padding-top:6px;overflow-x:auto}
  .diacol{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:26px;flex:1}
  .diacol .b{width:100%;max-width:30px;background:var(--ac);border-radius:3px 3px 0 0;min-height:2px}
  .diacol .f{width:100%;max-width:30px;background:var(--ok);border-radius:3px 3px 0 0;min-height:0}
  .diacol .d{font-size:10px;color:var(--mut);white-space:nowrap}
  .aviso{font-size:12px;color:var(--warn);margin-top:8px}
  .nota{font-size:11px;color:var(--mut);margin-top:10px}
  .btn{background:var(--ac);border:none;color:#fff;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer}
  .btn[disabled]{opacity:.5;cursor:default}
  .badge{display:inline-block;background:#13243f;border:1px solid var(--line);border-radius:6px;padding:1px 7px;font-size:11px;color:var(--mut)}
  .loginbox{max-width:460px;margin:60px auto;text-align:center}
  input[type=date]{background:#0b1220;border:1px solid var(--line);color:var(--tx);border-radius:8px;padding:6px 8px}
  @media(max-width:720px){ body{padding:8px} .cardk{min-width:46%} th,td{padding:5px 6px} }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loginbox" id="carregando">⏳ carregando dados…</div>
</div>
<script>
const MOD = '/girassol-backup-offline';
const DASH_BUILD = 'd2';
let DADOS = [];                    // conferidos (do /historico)
let periodo = 'mes', pDe = '', pAte = '';
let tabProd = 'fat';               // fat | uni
let SKUINFO = {};                  // sku → {saldo, preco, custo}
let skuInfoCarregado = false;

const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtBRL = v => 'R$ ' + (Math.round(v*100)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN = v => Number(v).toLocaleString('pt-BR');
const diaSP = iso => { try{ return new Date(iso).toLocaleString('sv-SE',{timeZone:'America/Sao_Paulo'}).slice(0,10); }catch(e){ return String(iso||'').slice(0,10); } };
const hojeSP = () => new Date().toLocaleString('sv-SE',{timeZone:'America/Sao_Paulo'}).slice(0,10);

async function boot(){
  try{
    const r = await fetch(MOD + '/historico', { credentials:'same-origin' });
    if(r.status === 401 || r.status === 403){ semLogin(); return; }
    const d = await r.json();
    if(!d || !Array.isArray(d.itens)){ semLogin(); return; }
    DADOS = d.itens;
    montar();
  }catch(e){
    $('app').innerHTML = '<div class="loginbox">✗ falha ao carregar: '+esc(e.message)+'<br><br><a href="'+MOD+'/dashboard">tentar de novo</a></div>';
  }
}
function semLogin(){
  $('app').innerHTML = '<div class="loginbox">🔒 Este dashboard usa a sessão de <b>admin</b> do checkout.<br><br>'+
    '<a href="'+MOD+'/painel"><button class="btn">Fazer login no painel</button></a>'+
    '<div class="nota">depois de logar, volte aqui e recarregue</div></div>';
}

function intervalo(){
  const hoje = hojeSP();
  let de, ate = hoje;
  if(periodo==='dia') de = hoje;
  else if(periodo==='ontem'){ const o = new Date(Date.now()-86400000).toLocaleString('sv-SE',{timeZone:'America/Sao_Paulo'}).slice(0,10); de = o; ate = o; }
  else if(periodo==='mesant'){ const [Y,M] = hoje.split('-').map(Number); const pm = new Date(Y, M-1-1, 1); const y2=pm.getFullYear(), m2=String(pm.getMonth()+1).padStart(2,'0'); de = y2+'-'+m2+'-01'; ate = y2+'-'+m2+'-'+String(new Date(Y, M-1, 0).getDate()).padStart(2,'0'); }
  else if(periodo==='7') de = new Date(Date.now()-6*86400000).toLocaleString('sv-SE',{timeZone:'America/Sao_Paulo'}).slice(0,10);
  else if(periodo==='30') de = new Date(Date.now()-29*86400000).toLocaleString('sv-SE',{timeZone:'America/Sao_Paulo'}).slice(0,10);
  else if(periodo==='mes') de = hoje.slice(0,8)+'01';
  else { de = pDe || '2000-01-01'; ate = pAte || hoje; }
  return {de, ate};
}
function setPeriodo(p){ periodo=p; render(); }

function montar(){
  $('app').innerHTML =
    '<h1>🌻 Dashboard · Magazine Girassol <span class="badge">'+DASH_BUILD+'</span></h1>'+
    '<div class="sub">fonte: pedidos finalizados no checkout offline · <a href="'+MOD+'/painel">← voltar ao checkout</a></div>'+
    '<div class="chips" id="chips"></div>'+
    '<div id="custom" style="display:none;margin:-4px 0 8px"><label class="mut">De <input type="date" id="pDe" onclick="this.showPicker&&this.showPicker()" onchange="pDe=this.value;render()"></label> '+
    '<label class="mut">até <input type="date" id="pAte" onclick="this.showPicker&&this.showPicker()" onchange="pAte=this.value;render()"></label></div>'+
    '<div id="cover" class="sub"></div>'+
    '<div class="cards" id="cards"></div>'+
    '<div class="sec"><h2>📈 Evolução por dia <span class="badge">azul = pedidos · verde = faturamento</span></h2><div class="diaschart" id="porDia"></div></div>'+
    '<div class="sec"><h2>🛒 Por canal</h2><div style="overflow-x:auto"><table id="porCanal"></table></div></div>'+
    '<div class="sec"><h2>🏆 Top produtos</h2><div class="tabs">'+
      '<button class="chip" id="tabFat" onclick="tabProd=\'fat\';render()">💰 por faturamento</button>'+
      '<button class="chip" id="tabUni" onclick="tabProd=\'uni\';render()">📦 por unidades</button></div>'+
      '<div style="overflow-x:auto"><table id="topProd"></table></div><div id="topProdAviso"></div></div>'+
    '<div class="sec"><h2>🗺️ Por estado (UF)</h2><div style="overflow-x:auto"><table id="porUF"></table></div><div id="ufAviso"></div></div>'+
    '<div class="sec"><h2>📦 Projeção de estoque & margem <span class="badge">últimos 14 dias de ritmo</span></h2>'+
      '<div id="projBox"><button class="btn" id="btnProj" onclick="carregarSkuInfo()">Carregar saldo, preço e custo do Bling (top 40 SKUs)</button>'+
      '<div class="nota">consulta o Bling por SKU (com cache de 6h) — leva ~30-60s na primeira vez</div></div>'+
      '<div style="overflow-x:auto"><table id="projTab"></table></div><div id="projAviso"></div></div>'+
    '<div class="nota">Regras deste dashboard: datas no horário de São Paulo · kits contam pelo SKU do kit · '+
      'faturamento = total do pedido no Bling · margem = <b>bruta estimada</b> (preço − custo do cadastro Bling), '+
      '<b>sem</b> frete e taxas de marketplace · só entram pedidos finalizados no checkout offline. <b>Comparando com o Jodda:</b> lá a data é a da VENDA aprovada no marketplace; aqui é a da EXPEDIÇÃO no checkout — e o "faturamento total" daqui inclui frete (use o card 🛍 produtos pra comparar).</div>';
  render();
}

function render(){
  // chips
  const defs = [['dia','Hoje'],['ontem','Ontem'],['7','7 dias'],['30','30 dias'],['mes','Mês'],['mesant','Mês anterior'],['custom','Período…']];
  $('chips').innerHTML = defs.map(([k,l])=>'<button class="chip'+(periodo===k?' on':'')+'" onclick="setPeriodo(\''+k+'\')">'+l+'</button>').join('');
  $('custom').style.display = periodo==='custom' ? '' : 'none';

  const {de, ate} = intervalo();
  const PER = DADOS.filter(h => { if(!h.conferido_em) return false; const d = diaSP(h.conferido_em); return d>=de && d<=ate; });

  // agregados
  let fat=0, comValor=0, semValor=0, flex=0, unid=0, itensTot=0, itensComValor=0, comUF=0, fatProd=0, freteEmb=0, fretePed=0;
  const porDia={}, porCanal={}, porProd={}, porUF={};
  PER.forEach(h=>{
    const d = diaSP(h.conferido_em);
    if(!porDia[d]) porDia[d]={ped:0,fat:0};
    porDia[d].ped++;
    const mk=(h.marketplace||'outro').toLowerCase();
    if(!porCanal[mk]) porCanal[mk]={ped:0,fat:0,flex:0,comValor:0};
    porCanal[mk].ped++;
    if(h.flex){ flex++; porCanal[mk].flex++; }
    if(h.valor!=null && isFinite(Number(h.valor))){ const v=Number(h.valor); fat+=v; comValor++; porDia[d].fat+=v; porCanal[mk].fat+=v; porCanal[mk].comValor++; }
    else semValor++;
    if(h.uf){ comUF++; const u=String(h.uf).toUpperCase(); if(!porUF[u]) porUF[u]={ped:0,fat:0}; porUF[u].ped++; if(h.valor!=null) porUF[u].fat+=Number(h.valor)||0; }
    let _iv=0, _todos=true, _nIt=0;
    (h.itens||[]).forEach(it=>{
      const q=Number(it.qtd||1); unid+=q; itensTot++; _nIt++;
      const sku=it.sku||'(sem SKU)';
      if(!porProd[sku]) porProd[sku]={sku,desc:it.descricao||'',qtd:0,fat:0,comV:0};
      porProd[sku].qtd+=q;
      if(it.valor_total!=null && isFinite(Number(it.valor_total))){ const vt=Number(it.valor_total); porProd[sku].fat+=vt; porProd[sku].comV++; itensComValor++; _iv+=vt; } else _todos=false;
    });
    fatProd += _iv;
    if(h.valor!=null && _nIt && _todos){ const fr = Number(h.valor)-_iv; if(isFinite(fr)){ freteEmb += fr; fretePed++; } }
  });
  const ticket = comValor ? fat/comValor : 0;

  // cobertura
  const pc = (a,b)=> b? Math.round(a/b*100) : 0;
  $('cover').innerHTML = 'Período <b>'+de+'</b> a <b>'+ate+'</b> · cobertura: '+
    '<span class="'+(pc(comValor,PER.length)>=95?'ok':'warn')+'">valor '+pc(comValor,PER.length)+'%</span> · '+
    '<span class="'+(pc(itensComValor,itensTot)>=95?'ok':'warn')+'">valor/item '+pc(itensComValor,itensTot)+'%</span> · '+
    '<span class="'+(pc(comUF,PER.length)>=95?'ok':'warn')+'">UF '+pc(comUF,PER.length)+'%</span>'+
    ((semValor||itensTot-itensComValor||PER.length-comUF)?' — <span class="mut">rode os backfills p/ completar o retroativo</span>':'');

  // cards
  $('cards').innerHTML =
    '<div class="cardk"><div class="v">'+fmtN(PER.length)+'</div><div class="l">pedidos</div></div>'+
    '<div class="cardk"><div class="v ok">'+fmtBRL(fat)+'</div><div class="l">faturamento total (pedidos, c/ frete)'+(semValor?' · parcial':'')+'</div></div>'+
    '<div class="cardk"><div class="v ok">'+fmtBRL(fatProd)+'</div><div class="l">🛍 produtos (sem frete) — comparável ao Jodda</div></div>'+
    '<div class="cardk"><div class="v">'+(fretePed?fmtBRL(freteEmb):'—')+'</div><div class="l">🚚 frete embutido (est., '+fretePed+' ped.)</div></div>'+
    '<div class="cardk"><div class="v">'+fmtBRL(ticket)+'</div><div class="l">ticket médio</div></div>'+
    '<div class="cardk"><div class="v">'+fmtN(unid)+'</div><div class="l">unidades</div></div>'+
    '<div class="cardk"><div class="v warn">⚡ '+fmtN(flex)+'</div><div class="l">FLEX enviados</div></div>'+
    '<div class="cardk" id="cardMargem"><div class="v mut">—</div><div class="l">margem bruta (carregue custos ↓)</div></div>';

  // por dia
  const dias = Object.keys(porDia).sort();
  const maxP = Math.max(1,...dias.map(d=>porDia[d].ped));
  const maxF = Math.max(1,...dias.map(d=>porDia[d].fat));
  $('porDia').innerHTML = dias.map(d=>{
    const o=porDia[d];
    return '<div class="diacol" title="'+d+' · '+o.ped+' pedido(s) · '+fmtBRL(o.fat)+'">'+
      '<div class="f" style="height:'+Math.round(o.fat/maxF*46)+'px"></div>'+
      '<div class="b" style="height:'+Math.max(2,Math.round(o.ped/maxP*46))+'px"></div>'+
      '<div class="d">'+d.slice(8,10)+'/'+d.slice(5,7)+'</div></div>';
  }).join('') || '<div class="mut">sem dados no período</div>';

  // por canal
  const canais = Object.keys(porCanal).sort((a,b)=>porCanal[b].ped-porCanal[a].ped);
  const NOME = {mercadolivre:'Mercado Livre',shopee:'Shopee',magalu:'Magalu',amazon:'Amazon',tiktok:'TikTok',madeira:'MadeiraMadeira',leroy:'Leroy Merlin',outro:'Outro'};
  $('porCanal').innerHTML = '<tr><th>Canal</th><th class="num">Pedidos</th><th class="num">%</th><th class="num">Faturamento</th><th class="num">Ticket</th><th class="num">⚡FLEX</th><th style="width:26%"></th></tr>'+
    canais.map(mk=>{const c=porCanal[mk];const p=pc(c.ped,PER.length);
      return '<tr><td>'+esc(NOME[mk]||mk)+'</td><td class="num">'+fmtN(c.ped)+'</td><td class="num">'+p+'%</td>'+
      '<td class="num ok">'+(c.fat?fmtBRL(c.fat):'<span class="mut">—</span>')+'</td>'+
      '<td class="num">'+(c.comValor?fmtBRL(c.fat/c.comValor):'<span class="mut">—</span>')+'</td>'+
      '<td class="num">'+(c.flex||'')+'</td><td><div class="bar"><i style="width:'+p+'%"></i></div></td></tr>';}).join('');

  // top produtos
  $('tabFat').className='chip'+(tabProd==='fat'?' on':''); $('tabUni').className='chip'+(tabProd==='uni'?' on':'');
  const prods = Object.values(porProd);
  const ord = tabProd==='fat' ? prods.filter(p=>p.fat>0).sort((a,b)=>b.fat-a.fat) : prods.sort((a,b)=>b.qtd-a.qtd);
  const fatTot = prods.reduce((s,p)=>s+p.fat,0)||1;
  $('topProd').innerHTML = '<tr><th>#</th><th>Produto</th><th class="num">Unid.</th><th class="num">Faturamento</th><th class="num">% fat.</th><th style="width:22%"></th></tr>'+
    ord.slice(0,30).map((p,i)=>{const pf=Math.round(p.fat/fatTot*100);
      return '<tr><td class="mut">'+(i+1)+'</td><td><b>'+esc(p.sku)+'</b><div class="mut" style="font-size:11px;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.desc)+'</div></td>'+
      '<td class="num">'+fmtN(p.qtd)+'</td><td class="num ok">'+(p.fat?fmtBRL(p.fat):'<span class="mut">—</span>')+'</td>'+
      '<td class="num">'+(p.fat?pf+'%':'<span class="mut">—</span>')+'</td><td><div class="bar"><i class="g" style="width:'+pf+'%"></i></div></td></tr>';}).join('');
  const semFat = prods.length - prods.filter(p=>p.fat>0).length;
  $('topProdAviso').innerHTML = (tabProd==='fat' && semFat) ? '<div class="aviso">⚠️ '+semFat+' SKU(s) sem valor por item (pedidos antigos) — aparecem só na aba unidades. Rode o backfill de detalhes.</div>' : '';

  // por UF
  const ufs = Object.keys(porUF).sort((a,b)=>porUF[b].ped-porUF[a].ped);
  $('porUF').innerHTML = '<tr><th>UF</th><th class="num">Pedidos</th><th class="num">%</th><th class="num">Faturamento</th><th style="width:30%"></th></tr>'+
    ufs.slice(0,15).map(u=>{const c=porUF[u];const p=pc(c.ped,comUF||1);
      return '<tr><td><b>'+esc(u)+'</b></td><td class="num">'+fmtN(c.ped)+'</td><td class="num">'+p+'%</td>'+
      '<td class="num ok">'+(c.fat?fmtBRL(c.fat):'<span class="mut">—</span>')+'</td><td><div class="bar"><i style="width:'+p+'%"></i></div></td></tr>';}).join('')
    || '<tr><td class="mut">nenhum pedido com UF no período</td></tr>';
  $('ufAviso').innerHTML = (PER.length-comUF) ? '<div class="aviso">⚠️ '+(PER.length-comUF)+' pedido(s) sem UF — rode o backfill de detalhes p/ preencher o retroativo.</div>' : '';

  renderProjecao();
}

// ── projeção de estoque (ritmo fixo: últimos 14 dias) ──────────────────────
function topSkus14(){
  const corte = new Date(Date.now()-13*86400000).toLocaleString('sv-SE',{timeZone:'America/Sao_Paulo'}).slice(0,10);
  const hoje = hojeSP();
  const agg = {};
  DADOS.forEach(h=>{
    if(!h.conferido_em) return;
    const d = diaSP(h.conferido_em); if(d<corte || d>hoje) return;
    (h.itens||[]).forEach(it=>{
      const sku=it.sku; if(!sku) return;
      if(!agg[sku]) agg[sku]={sku,desc:it.descricao||'',qtd:0,fat:0};
      agg[sku].qtd+=Number(it.qtd||1);
      if(it.valor_total!=null) agg[sku].fat+=Number(it.valor_total)||0;
    });
  });
  return Object.values(agg).sort((a,b)=>b.qtd-a.qtd).slice(0,40);
}

async function carregarSkuInfo(){
  const btn=$('btnProj'); btn.disabled=true; btn.textContent='consultando o Bling…';
  const top = topSkus14();
  const skus = top.map(t=>t.sku);
  try{
    for(let i=0;i<skus.length;i+=40){
      const r = await fetch(MOD+'/sku-info',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({skus:skus.slice(i,i+40)})});
      const d = await r.json();
      if(d && d.skus) Object.assign(SKUINFO, d.skus);
    }
    skuInfoCarregado = true;
    $('projBox').innerHTML = '<div class="mut" style="font-size:12px">dados do Bling carregados ✓ (cache de 6h no servidor)</div>';
  }catch(e){ btn.disabled=false; btn.textContent='falhou — tentar de novo'; }
  renderProjecao();
}

function renderProjecao(){
  const top = topSkus14();
  if(!top.length){ $('projTab').innerHTML='<tr><td class="mut">sem vendas nos últimos 14 dias</td></tr>'; return; }
  let margemTot=0, margemCob=0, margemBase=0;
  $('projTab').innerHTML = '<tr><th>SKU</th><th class="num">14d</th><th class="num">média/dia</th><th class="num">saldo</th><th class="num">acaba em</th><th class="num">comprar p/ 30d</th><th class="num">custo</th><th class="num">margem un.</th></tr>'+
    top.map(t=>{
      const info = SKUINFO[t.sku]||{};
      const md = t.qtd/14;
      const saldo = info.saldo;
      const diasR = (saldo!=null && md>0) ? saldo/md : null;
      const compra = (saldo!=null) ? Math.max(0, Math.ceil(md*30 - saldo)) : null;
      const precoMed = t.qtd? t.fat/t.qtd : null;
      const custo = info.custo;
      const mUn = (precoMed!=null && custo!=null) ? precoMed - custo : null;
      if(mUn!=null){ margemTot += mUn*t.qtd; margemCob++; }
      margemBase++;
      const cor = diasR==null?'mut':(diasR<7?'bad':(diasR<15?'warn':'ok'));
      return '<tr><td><b>'+esc(t.sku)+'</b><div class="mut" style="font-size:11px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.desc)+'</div></td>'+
        '<td class="num">'+fmtN(t.qtd)+'</td><td class="num">'+md.toFixed(1)+'</td>'+
        '<td class="num">'+(saldo!=null?fmtN(saldo):'<span class="mut">?</span>')+'</td>'+
        '<td class="num '+cor+'">'+(diasR!=null?(diasR>=99?'99+':diasR.toFixed(0))+' d':'<span class="mut">—</span>')+'</td>'+
        '<td class="num">'+(compra!=null?(compra?fmtN(compra):'<span class="ok">ok</span>'):'<span class="mut">—</span>')+'</td>'+
        '<td class="num">'+(custo!=null?fmtBRL(custo):'<span class="mut">—</span>')+'</td>'+
        '<td class="num '+(mUn!=null?(mUn>0?'ok':'bad'):'mut')+'">'+(mUn!=null?fmtBRL(mUn):'—')+'</td></tr>';
    }).join('');
  if(skuInfoCarregado){
    const cob = margemBase? Math.round(margemCob/margemBase*100):0;
    $('cardMargem').innerHTML = '<div class="v '+(margemTot>=0?'ok':'bad')+'">'+fmtBRL(margemTot)+'</div><div class="l">margem bruta 14d (top 40 · '+cob+'% c/ custo)</div>';
    $('projAviso').innerHTML = (cob<100)?'<div class="aviso">⚠️ '+(margemBase-margemCob)+' SKU(s) sem custo cadastrado no Bling (campo fornecedor) — margem parcial. Cadastre o custo lá ou me peça a importação por planilha.</div>':'';
  }
}

boot();
</script>
</body>
</html>
