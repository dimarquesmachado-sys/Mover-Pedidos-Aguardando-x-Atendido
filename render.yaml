services:
  - type: web
    name: bling-automacao-unificado
    runtime: node
    plan: starter          # Starter = sem hibernação (~$7/mês) — OBRIGATÓRIO para cron funcionar 24/7
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: TZ
        value: America/Sao_Paulo
      - key: NODE_ENV
        value: production

      # ─── GIRASSOL (mantém variáveis atuais sem prefixo) ─────────────
      - key: TOKEN_FILE
        value: /data/tokens.json
      - key: BLING_CLIENT_ID
        sync: false
      - key: BLING_CLIENT_SECRET
        sync: false
      - key: BLING_REDIRECT_URI
        sync: false
      - key: ML_CLIENT_ID
        sync: false
      - key: ML_CLIENT_SECRET
        sync: false
      - key: ML_TOKEN_FILE
        value: /data/ml_tokens.json
      - key: NF_BLING_CLIENT_ID
        sync: false
      - key: NF_BLING_CLIENT_SECRET
        sync: false
      - key: NF_BLING_REDIRECT_URI
        sync: false
      - key: NF_TOKEN_FILE
        value: /data/nf_tokens.json
      - key: SINTEGRA_TOKEN
        sync: false
      - key: SITUACAO_AGUARDANDO
        value: "7259"
      - key: ME_LOJA_IDS
        sync: false
      - key: JANELA_ULTIMOS_DIAS
        value: "15"
      - key: MAX_PEDIDOS_F1
        value: "40"
      - key: MAX_PEDIDOS_F2
        value: "60"
      - key: PAUSA_MS
        value: "700"

      # ─── AMBTOTAL (prefixo AMB_) ────────────────────────────────────
      - key: AMB_TOKEN_FILE
        value: /data/ambtotal/bling-tokens.json
      - key: AMB_ML_TOKEN_FILE
        value: /data/ambtotal/ml-tokens.json
      - key: AMB_BLING_CLIENT_ID
        sync: false
      - key: AMB_BLING_CLIENT_SECRET
        sync: false
      - key: AMB_BLING_REDIRECT_URI
        sync: false
      - key: AMB_ML_CLIENT_ID
        sync: false
      - key: AMB_ML_CLIENT_SECRET
        sync: false
      - key: AMB_ML_REDIRECT_URI
        sync: false
      - key: AMB_SITUACAO_AGUARDANDO
        value: "745122"
      - key: AMB_ME_LOJA_IDS
        value: "206017293"
      - key: AMB_JANELA_ULTIMOS_DIAS
        value: "15"
      - key: AMB_MAX_PEDIDOS_F1
        value: "40"
      - key: AMB_MAX_PEDIDOS_F2
        value: "60"
      - key: AMB_PAUSA_MS
        value: "700"

      # ─── GOOD IMPORT (descomentar na Etapa 2B) ──────────────────────
      # - key: GOOD_TOKEN_FILE
      #   value: /data/good/bling-tokens.json
      # ... etc

    disk:
      name: tokens-disk
      mountPath: /data
      sizeGB: 1
