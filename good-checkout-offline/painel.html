  .logoTopo{display:inline-block;width:32px;height:32px;vertical-align:middle;margin-right:9px;border-radius:8px}
  .logoBig{display:block;width:72px;height:72px;margin:0 auto 12px;border-radius:16px}
  .ver{font-size:12px;color:var(--mut);font-family:ui-monospace,monospace}
  .grow{flex:1}
  .qz{font-size:13px;padding:4px 10px;border-radius:20px;border:1px solid var(--line);cursor:pointer;white-space:nowrap}
  .qz.on{color:var(--ok);border-color:var(--ok)} .qz.off{color:var(--err);border-color:var(--err)}
  input.op{background:var(--card2);border:1px solid var(--line);color:var(--tx);border-radius:8px;padding:5px 9px;font-size:13px;width:120px}
  input.op[readonly]{opacity:.85;cursor:default;border-color:var(--ok)}
  .loginback{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
  .loginback.hide{display:none}
  .loginbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:30px 26px;width:300px;max-width:90vw;text-align:center;box-shadow:0 12px 44px rgba(0,0,0,.55)}
  .loginttl{font-size:20px;font-weight:800;margin-bottom:5px}
  .loginsub{font-size:13px;color:var(--mut);margin-bottom:20px}
  .loginfld{width:100%;box-sizing:border-box;padding:11px 12px;margin-bottom:11px;background:#0e1620;border:1px solid var(--line);border-radius:9px;color:var(--tx);font-size:15px}
  .loginfld:focus{outline:none;border-color:var(--ac)}
  .loginbtn{width:100%;padding:12px;font-size:15px;margin-top:3px}
  .loginerr{color:var(--err);font-size:13px;margin-top:11px;min-height:16px}
  .stats{display:flex;gap:14px;margin-top:7px;font-size:13px;color:var(--mut);flex-wrap:wrap}
  .stats b{color:var(--tx)}

  /* layout 2 colunas */
  .main{flex:1 1 auto;display:flex;min-height:0}
  .sidebar{width:410px;flex:0 0 410px;border-right:1px solid var(--line);overflow-y:auto;padding:10px;background:#12161e}
  .detail{flex:1 1 auto;overflow-y:auto;padding:18px 22px}
  .sbtools{display:flex;flex-wrap:wrap;gap:8px}
  #modoBtn.on{border-color:var(--ac);color:var(--ac)}
  .busca{width:100%;box-sizing:border-box;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--tx);font-size:13px;margin-bottom:10px}
  .busca:focus{outline:none;border-color:var(--ac)}
  .busca::placeholder{color:var(--mut)}
  .scount{font-size:11px;color:var(--mut);margin:0 2px 8px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:5px 10px;color:var(--mut);font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .chip b{color:var(--tx)}
  .chip:hover{border-color:var(--mut)}
  .chip.on{border-color:var(--ac);color:var(--tx);background:#13243f}
  .chip.flex.on{border-color:var(--warn);background:#2a1f08}
  .cdot{width:8px;height:8px;border-radius:50%;display:inline-block}

  .btn{background:var(--ac);color:#fff;border:0;border-radius:9px;padding:9px 14px;font-size:14px;font-weight:600;cursor:pointer}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.sec{background:var(--card2);color:var(--tx);border:1px solid var(--line)}
  .btn.ok{background:var(--ok)} .btn.warn{background:var(--warn);color:#1a1205}
  .btn.sm{padding:6px 10px;font-size:13px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

  /* card lateral */
  .scard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-bottom:8px;cursor:pointer}
  .scard:hover{border-color:#3a4657}
  .scard.sel{border-color:var(--ac);background:#16202e}
  .scard.done{opacity:.5}
  .scard.resv{border-color:#b06a16;background:#241a0e}
  .scard.resv:hover{background:#2d2010}
  .resvtag{margin-left:auto;color:#f0a23a;font-size:11px;font-weight:700;white-space:nowrap}
  .scl1{display:flex;align-items:center;gap:8px}
  .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;color:#0b0d12;text-transform:uppercase}
  .num{font-size:18px;font-weight:700}
  .smeta{font-size:13px;color:var(--mut);font-family:ui-monospace,monospace;margin-top:4px}
  .scli{font-size:14px;color:var(--tx);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pdfok{color:var(--ok);font-weight:700}
  .donetag{margin-left:auto;color:var(--ok);font-size:11px;font-weight:700}

  /* pedido SEM ETIQUETA (problema) */
  .stwarn{cursor:pointer;color:var(--err)}
  .stwarn b{color:var(--err)}
  .stwarn:hover{text-decoration:underline}
  .chip.serr{border-color:rgba(239,68,68,.5);color:#ffb4b4}
  .chip.serr .cdot{display:none}
  .chip.serr.on{border-color:var(--err);color:#fff;background:#2a1216}
  .scard.semetiq{border:2px solid var(--err);background:#2a1216}
  .scard.semetiq:hover{background:#371820}
  .setag{margin-left:auto;background:var(--err);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;text-transform:uppercase}
  .voltag{background:#7a3e12;color:#ffd9a8;border:1px solid #c47a2e;font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;white-space:nowrap}
  .dvol{background:#3a1d08;border:2px solid #c47a2e;border-radius:11px;padding:11px 14px;margin:10px 0;color:#ffd9a8;font-size:14px;font-weight:700;line-height:1.4}
  .dvol b{color:#ffb259;font-size:16px}
  .mvol{background:#3a1d08;border:2px solid #c47a2e;border-radius:11px;padding:13px 15px;margin-bottom:16px;color:#ffd9a8;font-size:17px;font-weight:800;text-align:center;line-height:1.35}

  @media(max-width:720px){

const UI_BUILD = 'b32';   // cravado no painel — se não bater com a versão do servidor, painel tá velho em cache
const MKT = {
  ml:{n:'ML',c:'#ffe600'}, shopee:{n:'Shopee',c:'#ee4d2d'}, tiktok:{n:'TikTok',c:'#69c9d0'},
  amazon:{n:'Amazon',c:'#b3b9c4'}, magalu:{n:'Magalu',c:'#0086ff'},
  madeira:{n:'Madeira',c:'#ff7a18'}, leroy:{n:'Leroy Merlin',c:'#78be20'}, carrefour:{n:'Carrefour',c:'#0653a3'},
  olist:{n:'Olist',c:'#7b3ff2'}, b2w:{n:'Americanas',c:'#ed1c24'}, mercadoshops:{n:'MercadoShops',c:'#2d3277'},
  outro:{n:'Outro',c:'#94a3b8'}
};
let pedidoAtual = null;   // {bling_id,numero,cliente,nf,marketplace,itens:[{sku,ean,descricao,qtd,bipado}]}
let zplAtual = null;
let listaCache = [];
let semEtiqCache = [];   // pedidos ATENDIDO sem etiqueta (problema)
let filtroBusca = '';
let estoqueSaldos = {};      // sku → saldoVirtual do Bling (estoque restante), carregado async ao abrir o pedido
let estoqueCheckout = {};    // sku → quanto desse produto está em pedidos no checkout agora (info, não subtrai)
let estoqueCarregado = false; // já tentou buscar? false=mostra "…", true=mostra número/"—"
let filtroMkt = null;   // null=todos | 'ml'|'shopee'|... | 'flex'
let ordenacao = 'numero';   // 'numero' (mais antigos) | 'produto' (agrupa pedidos do mesmo SKU p/ picking mais rapido)
function setOrdenacao(v){ ordenacao = v; renderChips(); renderLista(); }
// chave de agrupamento por produto: SKUs distintos ordenados e juntados. "so SKU-A" ("a") vem ANTES de
// "SKU-A + SKU-B" ("a|b"), que vem antes de "so SKU-B" ("b") — pedidos puros primeiro, depois os combinados.
function skuKeyPedido(p){ const arr=(p.skus_pick&&p.skus_pick.length)?p.skus_pick:(p.skus||[]); const u=[...new Set(arr.map(s=>String(s).toLowerCase()))].sort(); return u.length?u.join('|'):'~~~'; }

const $ = id => document.getElementById(id);
const norm = c => String(c||'').trim().replace(/\s+/g,'');
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1800); }

// ── Madeira Madeira: etiqueta é PDF (não passa por ZPL) e pode ter 2+ volumes ──
function ehPedidoMadeira(id){
  const p = (listaCache||[]).find(x=>String(x.id)===String(id));
  if(p) return p.marketplace==='madeira' || !!p.etiqueta_mm;
  return !!(pedidoAtual && String(pedidoAtual.bling_id)===String(id) && (pedidoAtual.marketplace==='madeira' || pedidoAtual.etiqueta_mm));
}
function volumesDoPedido(id){
  const p = (listaCache||[]).find(x=>String(x.id)===String(id));
  if(p && p.volumes) return p.volumes;
  if(pedidoAtual && String(pedidoAtual.bling_id)===String(id) && pedidoAtual.volumes) return pedidoAtual.volumes;
  return 1;
}

const opIn = $('operador');
opIn.value = localStorage.getItem('gbkp_op') || '';
opIn.addEventListener('input', ()=>localStorage.setItem('gbkp_op', opIn.value));

// ── LOGIN (só ativa se GOODBKP_OPERADORES estiver configurada no servidor) ──
let loginAtivo = false;
window.ADMINS = [];
async function checarLogin(){
  try{
    const d = await api('/good-checkout-offline/operadores');
    loginAtivo = !!(d && d.login_ativo);
    window.ADMINS = (d && d.admins) || [];
    if(!loginAtivo){ mostrarLogin([]); $('loginSub').textContent='Operadores não configurados — avise o admin'; return; }   // proteção obrigatória: sem operadores, sem acesso
    const logado = localStorage.getItem('gbkp_logado')==='1' && (localStorage.getItem('gbkp_op')||'').trim();
    if(logado){ aplicarLogado(); }
    else { mostrarLogin(d.operadores||[]); }
  }catch(e){ mostrarLogin([]); $('loginSub').textContent='Erro ao verificar login — recarregue'; }
}
function mostrarLogin(nomes){
  const sel=$('loginNome');
  sel.innerHTML = (nomes||[]).map(n=>'<option value="'+esc(n)+'">'+esc(n)+'</option>').join('');
  $('loginSub').textContent='Entre com seu nome e senha';
  $('loginForm').style.display='';
  $('loginSenha').value=''; $('loginErr').textContent='';
  $('loginback').classList.remove('hide');
  setTimeout(()=>$('loginSenha').focus(),100);
}
async function fazerLogin(){
  const nome=$('loginNome').value, senha=$('loginSenha').value;
  $('loginErr').textContent='';
  try{
    const r = await postJson('/good-checkout-offline/login', {nome, senha});
    if(r && r.ok){ localStorage.setItem('gbkp_op', r.nome); localStorage.setItem('gbkp_logado','1'); aplicarLogado(); }
    else { $('loginErr').textContent=(r&&r.erro)||'nome ou senha inválidos'; $('loginSenha').select(); }
  }catch(e){ $('loginErr').textContent='falha ao entrar: '+e.message; }
}
function aplicarLogado(){
  $('loginback').classList.add('hide');
  opIn.value = localStorage.getItem('gbkp_op')||'';
  opIn.setAttribute('readonly','readonly');
  $('btnSair').style.display='';
  carregarLista();
}
function sair(){ localStorage.removeItem('gbkp_logado'); opIn.removeAttribute('readonly'); $('btnSair').style.display='none'; checarLogin(); }
// só admin (env GOODBKP_ADMIN) pode reabrir/reverter. Lista vazia = todo mundo pode (comportamento antigo).
function souAdmin(){ const a = window.ADMINS || []; return a.length===0 || a.includes(opAtual().toLowerCase()); }

// ── áudio ──
let actx;
function beep(ok){
  try{ actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain(); o.connect(g); g.connect(actx.destination);
    o.type='square'; o.frequency.value = ok?900:200; g.gain.value=0.12;
    o.start(); o.stop(actx.currentTime + (ok?0.07:0.28));
  }catch(e){}
}

// ── QZ Tray ──
async function setupQZ(){
  if(!window.qz){ qzUI(false,'lib não carregou'); return; }
  qz.api.setPromiseType(r => new Promise(r));
  if(window.sha256) qz.api.setSha256Type(d => sha256(d));
  // assinatura → mata o popup "Untrusted". Só ativa se houver certificado configurado no servidor.
  try{
    const cert = await fetch('/good-checkout-offline/qz-cert', {cache:'no-store'}).then(r=>r.text());
    if(cert && cert.indexOf('BEGIN CERTIFICATE')>=0){
      qz.security.setCertificatePromise(function(resolve){ resolve(cert); });
      qz.security.setSignatureAlgorithm('SHA512');
      qz.security.setSignaturePromise(function(toSign){
        return function(resolve, reject){
          fetch('/good-checkout-offline/qz-sign?request='+encodeURIComponent(toSign), {cache:'no-store'})
            .then(function(r){ return r.text(); }).then(resolve).catch(reject);
        };
      });
    }
  }catch(e){}
}
function qzUI(on, txt){ const el=$('qzStatus'); el.className='qz '+(on?'on':'off'); el.textContent='QZ: '+(txt||(on?'conectado':'desconectado')); }
async function conectarQZ(){
  if(!window.qz) throw new Error('Biblioteca QZ não carregou (sem internet?)');
  if(!qz.websocket.isActive()){ await qz.websocket.connect(); }
  qzUI(true); return true;
}
async function reconectarQZ(){ try{ await conectarQZ(); toast('QZ Tray conectado'); }catch(e){ qzUI(false); toast('QZ Tray não conectou — ele está aberto?'); } }
async function getImpressora(){
  let p = localStorage.getItem('gbkp_printer');
  if(p) return p;
  const lista = await qz.printers.find();
  p = (lista||[]).find(n=>/zebra|zdesigner|zpl|\bzd\b|\bgk\b|\bgc\b/i.test(n)) || (lista||[])[0];
  if(p) localStorage.setItem('gbkp_printer', p);
  return p;
}
async function escolherImpressora(){
  try{
    await conectarQZ();
    const lista = await qz.printers.find();
    if(!lista||!lista.length){ toast('Nenhuma impressora no QZ'); return; }
    const atual = localStorage.getItem('gbkp_printer')||'';
    const msg = 'Impressoras:\n\n'+lista.map((n,i)=>(i+1)+') '+n+(n===atual?'  ← atual':'')).join('\n')+'\n\nNº da Zebra:';
    const r = prompt(msg, lista.indexOf(atual)>=0?String(lista.indexOf(atual)+1):'1');
    const idx = parseInt(r,10)-1;
    if(idx>=0&&idx<lista.length){ localStorage.setItem('gbkp_printer', lista[idx]); toast('Impressora: '+lista[idx]); }
  }catch(e){ toast('Erro: '+e.message); }
}
async function imprimirZPL(zpl){
  await conectarQZ();
  const printer = await getImpressora();
  if(!printer) throw new Error('Nenhuma impressora encontrada');
  const cfg = qz.configs.create(printer);
  await qz.print(cfg, [{ type:'raw', format:'command', flavor:'plain', data: zpl }]);
}

// ── impressora da NF (DANFE = A4, impressora comum, NÃO a Zebra) ──
async function getImpressoraNF(){
  let p = localStorage.getItem('gbkp_printer_nf');
  if(p) return p;
  const lista = await qz.printers.find();
  p = (lista||[]).find(n=>!/zebra|zdesigner|zpl|\bzd\b|\bgk\b|\bgc\b/i.test(n)) || (lista||[])[0];
  if(p) localStorage.setItem('gbkp_printer_nf', p);
  return p;
}
async function escolherImpressoraNF(){
  try{
    await conectarQZ();
    const lista = await qz.printers.find();
    if(!lista||!lista.length){ toast('Nenhuma impressora no QZ'); return; }
    const atual = localStorage.getItem('gbkp_printer_nf')||'';
    const msg = 'Impressoras:\n\n'+lista.map((n,i)=>(i+1)+') '+n+(n===atual?'  ← atual':'')).join('\n')+'\n\nNº da impressora da NF (A4):';
    const r = prompt(msg, lista.indexOf(atual)>=0?String(lista.indexOf(atual)+1):'1');
    const idx = parseInt(r,10)-1;
    if(idx>=0&&idx<lista.length){ localStorage.setItem('gbkp_printer_nf', lista[idx]); toast('Impressora NF: '+lista[idx]); }
  }catch(e){ toast('Erro: '+e.message); }
}
async function imprimirPDF(url){
  await conectarQZ();
  const printer = await getImpressoraNF();
  if(!printer) throw new Error('Nenhuma impressora encontrada');
  const resp = await fetch(url);
  if(!resp.ok) throw new Error('PDF '+resp.status);
  const bytes = new Uint8Array(await resp.arrayBuffer());
  let bin=''; for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
  const b64 = btoa(bin);
  const cfg = qz.configs.create(printer);
  await qz.print(cfg, [{ type:'pixel', format:'pdf', flavor:'base64', data: b64 }]);
}

// ── DANFE SIMPLIFICADO em ZPL NATIVO → impresso CRU na Zebra (mesmo cano da etiqueta, instantâneo) ──
async function imprimirSimplificadoZebra(id){
  const zpl = await fetch(location.origin+'/good-checkout-offline/danfe-simp/'+id+'?zpl=1')
    .then(r=>{ if(!r.ok) throw new Error('DANFE '+r.status); return r.text(); });
  await imprimirZPL(zpl);   // raw ZPL — igual a etiqueta que já funciona
}

// ── ETIQUETA FUNDIDA: etiqueta + DANFE numa etiqueta só, com REDE DE SEGURANÇA ──
// Shopee / ML-combinado / sem NF → a etiqueta já basta (imprime direto).
// Senão tenta /etiqueta-fundida (1 etiqueta). Se a fusão declinar (raster que enche
// tudo) ou der qualquer erro → cai no jeito antigo (etiqueta + DANFE separada = 2).
// Nunca deixa o funcionário sem imprimir.
async function imprimirEtiquetaZebra(id){
  const temNf = !!(pedidoAtual && pedidoAtual.nf);
  const jaTem = etiquetaJaTemDanfe(pedidoAtual && pedidoAtual.marketplace, zplAtual, pedidoAtual && pedidoAtual.nf);
  if(!temNf || jaTem){ await imprimirZPL(zplAtual); return { fundida:false, duas:false }; }
  try{
    const resp = await fetch('/good-checkout-offline/etiqueta-fundida/'+id);
    if(resp.ok){ await imprimirZPL(await resp.text()); return { fundida:true, duas:false }; }
  }catch(e){ /* cai no fallback abaixo */ }
  await imprimirZPL(zplAtual);                 // jeito antigo, seguro
  imprimirSimplificadoZebra(id).catch(()=>{}); // DANFE separada (2 etiquetas)
  return { fundida:false, duas:true };
}

// imprime um PDF (ex.: etiqueta Melhor Envio do Bling) NA ZEBRA, rasterizado — mesmo cano da etiqueta nativa
async function imprimirPdfNaZebra(url){
  await conectarQZ();
  const printer = await getImpressora();   // a Zebra (térmica)
  if(!printer) throw new Error('Nenhuma impressora encontrada');
  const resp = await fetch(url);
  if(!resp.ok) throw new Error('PDF '+resp.status);
  const bytes = new Uint8Array(await resp.arrayBuffer());
  let bin=''; for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
  const b64 = btoa(bin);
  const cfg = qz.configs.create(printer);
  await qz.print(cfg, [{ type:'pixel', format:'pdf', flavor:'base64', data: b64 }]);
}

// ── Madeira na ZEBRA ──
// Madeira Envios  → ZPL montado pelo servidor: [adesivo VOLUME i/N][etiqueta Correios 10x15][DANFE-simp].
// Frete do VENDEDOR (ex.: Melhor Envio) → não tem lote no mapa Madeira (502); a etiqueta está no Bling.
//   Nesse caso puxa a etiqueta do Bling (PDF) e imprime na Zebra (rasterizada) + a DANFE-simplificada.
async function imprimirMadeiraZebra(id){
  let r=null;
  try{ r = await fetch(location.origin+'/good-checkout-offline/etiqueta-madeira-zpl/'+id); }catch(e){ r=null; }
  if(r && r.ok){ await imprimirZPL(await r.text()); return; }   // Madeira Envios: ZPL montado (adesivo+Correios+DANFE)
  // 502/sem lote no mapa = frete do vendedor (Melhor Envio etc.) → etiqueta no Bling, não no Madeira.
  await imprimirPdfNaZebra(location.origin+'/good-checkout-offline/etiqueta-pdf/'+id);
  try{ await imprimirSimplificadoZebra(id); }catch(e){}   // + DANFE-simp, igual ao combo Madeira
}

// ── chave Zebra(ZPL) ↔ A4(PDF) p/ a ETIQUETA (a NF é sempre A4) ──
function modoEtiqueta(){ return localStorage.getItem('gbkp_modo_etiq')==='a4' ? 'a4' : 'zebra'; }
async function imprimirEtiqueta(id, zpl){
  if(ehPedidoMadeira(id) && modoEtiqueta()!=='a4'){ await imprimirMadeiraZebra(id); return; }   // Madeira na Zebra: ZPL montado (adesivo+Correios+DANFE)
  if(modoEtiqueta()==='a4' || ehPedidoMadeira(id)){
    window.open(location.origin+'/good-checkout-offline/etiqueta-pdf/'+id, '_blank');  // Madeira em A4, ou modo A4 — imprime pelo navegador
  }else{
    const z = zpl || await fetch('/good-checkout-offline/etiqueta/'+id).then(r=>r.text());
    await imprimirZPL(z);  // Zebra (QZ Tray)
  }
}
function aplicarModoLabel(){
  const b=$('modoBtn'); if(!b) return;
  const a4 = modoEtiqueta()==='a4';
  b.textContent = a4 ? '📄 Etiq: A4' : '🖨️ Etiq: Zebra';
  b.classList.toggle('on', a4);
}
function trocarModo(){
  const novo = modoEtiqueta()==='a4' ? 'zebra' : 'a4';
  localStorage.setItem('gbkp_modo_etiq', novo);
  aplicarModoLabel();
  toast(novo==='a4' ? 'Etiqueta agora abre em PDF — imprima pelo navegador' : 'Etiqueta agora pela Zebra (ZPL/QZ)');
}

// ── API ──

    if(typeof checarLogin==='function'){ checarLogin(); }
    return {ok:false, erro:'Sessão expirada — entre de novo'}; }

});
// ── presença/reserva entre PCs ──
function opAtual(){ return ((opIn && opIn.value) || localStorage.getItem('gbkp_op') || '').trim(); }
function postJson(path, obj){ return api(path, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(obj)}); }

function iniciarHeartbeat(id){ pararHeartbeat(); hbTimer = setInterval(()=>{ postJson('/good-checkout-offline/reservar', {id, user:opAtual()}).catch(()=>{}); }, 120000); }
function pararHeartbeat(){ if(hbTimer){ clearInterval(hbTimer); hbTimer=null; } }
function liberarReserva(id){ if(id) postJson('/good-checkout-offline/liberar', {id}).catch(()=>{}); }

async function carregarLista(){
  try{
    const d = await api('/good-checkout-offline/lista');
    $('ver').textContent = (d.versao ? d.versao.replace('good-checkout-offline ','') : 'v?') + ' · ui ' + UI_BUILD;

    $('stats').innerHTML =

// força uma sincronia real com o Bling (roda 1 ciclo → reconcilia o que saiu do ATENDIDO)
async function sincronizar(){
  const b = $('btnSync');
  const orig = b ? b.textContent : '';
  if(b){ b.textContent='⏳ Sincronizando…'; b.disabled = true; }
  try{
    await fetch('/good-checkout-offline/run', { method:'POST' });
    await new Promise(r=>setTimeout(r, 4000)); await carregarLista();
    await new Promise(r=>setTimeout(r, 4000)); await carregarLista();
    toast('Sincronizado com o Bling');
  }catch(e){ toast('Falha ao sincronizar: '+e.message); }
  finally{ if(b){ b.textContent = orig || '↻ Atualizar'; b.disabled = false; } }
}

function onBusca(v){ filtroBusca = (v||'').trim().toLowerCase(); renderLista(); }
// ── serviço Shopee não reconhecido (rótulo novo do Bling) → conferir se é FLEX ou ponto de coleta ──
const SHOPEE_SERVICOS_OK = ['shopee xpress', 'shopee entrega direta', 'entrega direta', 'logistica shopee'];
function servicoDesconhecido(p){
  if(!p || String(p.marketplace||'').toLowerCase()!=='shopee') return false;
  const s = String(p.servico||'').toLowerCase().trim();
  if(!s) return true;
  return !SHOPEE_SERVICOS_OK.some(k=>s.includes(k));
}
function filtrar(lista){
  let l = lista;
  if(filtroMkt==='flex') l = l.filter(p=>p.flex);
  else if(filtroMkt==='serviconovo') l = l.filter(servicoDesconhecido);
  else if(filtroMkt) l = l.filter(p=>p.marketplace===filtroMkt);
  if(filtroBusca){
    const q = filtroBusca;
    l = l.filter(p=>
      String(p.numero||'').includes(q)
      || String(p.nf_numero||'').toLowerCase().includes(q)
      || (p.cliente||'').toLowerCase().includes(q)
      || (MKT[p.marketplace]||MKT.outro).n.toLowerCase().includes(q)
      || String(p.id||'').includes(q)
    );
  }
  return l;
}

// ── chips de marketplace + FLEX ──
const MKT_ORDEM = ['ml','shopee','tiktok','magalu','amazon','leroy','carrefour','madeira','olist','b2w','mercadoshops','outro'];
function setFiltroMkt(v){
  filtroMkt = v;
  // se o pedido aberto sumir da lista filtrada, limpa a tela (não deixa o pedido de outro marketplace persistindo)
  if(pedidoAtual){
    const vis = filtrar(listaCache).some(p => String(p.id)===String(pedidoAtual.bling_id));
    if(!vis){ pedidoAtual=null; zplAtual=null; mostrarPlaceholder(); }
  }
  renderChips(); renderLista();
}
function chipBtn(label, n, val, cor){
  const ativo = (filtroMkt===val);
  const dot = cor ? '<span class="cdot" style="background:'+cor+'"></span>' : '';
  const fx = val==='flex' ? ' flex' : ((val==='semetiqueta'||val==='serviconovo') ? ' serr' : '');
  return '<button class="chip'+fx+(ativo?' on':'')+'" onclick="setFiltroMkt('+(val===null?'null':("'"+val+"'"))+')">'+dot+esc(label)+' <b>'+n+'</b></button>';
}
function renderChips(){
  const box = $('chips'); if(!box) return;
  const cont = {}; let flexN = 0;
  listaCache.forEach(p=>{ cont[p.marketplace] = (cont[p.marketplace]||0)+1; if(p.flex) flexN++; });

// ── detalhe / bipagem (centro) ──
async function selecionar(id){
  try{
    // trocou de pedido? solta a reserva do anterior
    if(pedidoAtual && String(pedidoAtual.bling_id)!==String(id)){ liberarReserva(pedidoAtual.bling_id); pararHeartbeat(); }
    const ped = await api('/good-checkout-offline/pedido/'+id);
    if(ped.erro){ toast(ped.erro); return; }
    // MINI-CONFERÊNCIA: já finalizado em outro PC? tira da tela e nem abre.
    if(ped.conferido){
      toast('✓ '+(ped.numero||id)+' já finalizado'+(ped.conferido.user?' por '+ped.conferido.user:'')+' — saiu da lista');
      listaCache = listaCache.filter(x=>String(x.id)!==String(id));
      pedidoAtual=null; renderLista(); return;
    }
    // RESERVA: marca esse operador como dono (presença entre PCs)
    const op = opAtual();
    let rv = await postJson('/good-checkout-offline/reservar', {id, user:op});
    if(rv && rv.ok===false && rv.reservado_por){
      const mins = rv.em ? Math.max(0, Math.round((Date.now()-Date.parse(rv.em))/60000)) : 0;
      if(!confirm('⚠️ '+rv.reservado_por+' está separando esse pedido'+(mins?' há '+mins+' min':'')+'.\n\nAssumir mesmo assim?')){ carregarLista(); return; }
      rv = await postJson('/good-checkout-offline/reservar', {id, user:op, forcar:true});
    }
    prepararPedido(ped);
    pedidoAtual = ped;
    zplAtual = await fetch('/good-checkout-offline/etiqueta/'+id).then(r=>r.text());
    estoqueSaldos = {}; estoqueCheckout = {}; estoqueCarregado = false;   // reset: estoque do pedido novo (renderiza "…" até chegar)
    renderDetail();
    renderLista(); // atualiza highlight
    iniciarHeartbeat(id);
    carregarEstoque(id);   // 📦 busca o estoque restante ao vivo (async, não trava a abertura)
  }catch(e){ toast('Erro: '+e.message); }
}

// grupos = exibição (kit vira cabeçalho + componentes; senão item simples)
// unidades = lista PLANA do que se bipa (componentes p/ kit, o próprio item p/ leaf)
function prepararPedido(ped){
  const grupos = [], unidades = [];
  let uid = 0;
  const novaUnid = (o)=>{ const u={ _id:uid++, sku:o.sku||'', ean:o.ean||null, descricao:o.descricao||'', img:o.img||null, qtd:Number(o.qtd||0), bipado:0, loc:o.loc||'' }; unidades.push(u); return u; };
  for(const it of (ped.itens||[])){
    if(it.tipo==='kit' && Array.isArray(it.componentes) && it.componentes.length){
      const comps = it.componentes.map(c=>novaUnid(c));
      grupos.push({ tipo:'kit', sku:it.sku, descricao:it.descricao, ean:it.ean, img:it.img, qtd:Number(it.qtd||0), comps });
    } else {
      grupos.push({ tipo:'leaf', unit:novaUnid(it) });
    }
  }
  ped.grupos = grupos; ped.unidades = unidades;
}

// 📦 ESTOQUE AO VIVO: busca o saldo restante do Bling p/ os itens do pedido aberto (async, não trava a tela).
// a NF já baixou o estoque antes do checkout, então o saldoVirtual já é o restante real. Bling fora = "—".
async function carregarEstoque(id){
  try{
    const r = await fetch('/good-checkout-offline/estoque-pedido/'+id).then(x=>x.json());
    if(!pedidoAtual || String(pedidoAtual.bling_id)!==String(id)) return; // trocou de pedido enquanto carregava
    if(r && r.ok){ if(r.saldos) estoqueSaldos = r.saldos; if(r.checkout) estoqueCheckout = r.checkout; }
  }catch(e){ /* Bling offline → mapas vazios → saldo mostra "—" */ }
  if(!pedidoAtual || String(pedidoAtual.bling_id)!==String(id)) return;
  estoqueCarregado = true;
  renderItens();
}

// dois números por item: 📦 Saldo Bling (verde/vermelho — o que SOBRA após o checkout) + 🛒 Em checkout (info, não subtrai).
function estTags(sku){
  if(!estoqueCarregado) return '<span class="esttag estload">📦 Saldo …</span>';
  const k = String(sku||'').trim();
  const s = estoqueSaldos[k];
  let saldoPill;
  if(s==null){
    saldoPill = '<span class="esttag estunk" title="estoque indisponível (Bling fora do ar?)">📦 Saldo —</span>';
  } else {
    const n = Number(s);
    saldoPill = '<span class="esttag '+(n>0?'estok':'estzero')+'" title="Saldo Bling: o que vai SOBRAR no estoque depois que os pedidos do checkout saírem.">📦 Saldo Bling: '+n+'</span>';
  }
  const c = estoqueCheckout[k];
  const cn = (c==null ? 0 : Number(c));
  const chkPill = '<span class="esttag estchk" title="Quanto deste produto está em pedidos no checkout AGORA (este pedido + os outros da fila). NÃO desconta do Saldo Bling.">🛒 Em checkout: '+cn+'</span>';
  return saldoPill+' '+chkPill;
}

// 🔄 rebusca o saldo de estoque do Bling ao vivo (sem fechar/reabrir o pedido)
function atualizarEstoque(){
  if(!pedidoAtual) return;
  estoqueSaldos = {}; estoqueCheckout = {}; estoqueCarregado = false;   // zera + mostra "…" enquanto rebusca (falha → "—")
  renderItens();
  carregarEstoque(pedidoAtual.bling_id);
}

      '<div class="e">SKU '+esc(u.sku||'—')+' · EAN '+(u.ean?esc(u.ean):'<span class="noean">sem EAN</span>')+' · '+((u.loc||'').trim()?'<span class="loctag">📍 '+esc(u.loc)+'</span>':'<span class="locsem">📍 sem local</span>')+'</div>'+

function fecharImagem(){ const lb=$('lightbox'); if(!lb) return; lb.classList.remove('show'); lb.innerHTML=''; setTimeout(()=>{const s=$('scan'); if(s) s.focus();},60); }

function renderItens(){
  if(!pedidoAtual) return;
  const un = pedidoAtual.unidades;
  const total = un.reduce((s,u)=>s+u.qtd,0);
  const feito = un.reduce((s,u)=>s+u.bipado,0);
  const pe = $('bProg'); if(pe) pe.innerHTML = '<span class="'+(feito>=total&&total>0?'done':'')+'">'+feito+'</span>/'+total;
  const box = $('bItens'); if(box) box.innerHTML = pedidoAtual.grupos.map(g=>{
    if(g.tipo==='kit'){
      const done = g.comps.every(c=>c.bipado>=c.qtd);
      return '<div class="kitwrap '+(done?'full':'')+'">'+
        '<div class="kithead">'+thumb(g.img)+'<div class="kh-txt"><span class="ktag">KIT · NF</span> '+esc(g.descricao||g.sku)+
          '<div class="e">SKU '+esc(g.sku||'—')+'</div></div></div>'+
        '<div class="comps">'+g.comps.map(c=>unitRow(c,true)).join('')+'</div>'+
      '</div>';
    }
    return unitRow(g.unit,false);
  }).join('');
  const pronto = (feito>=total && total>0);
  const fb = $('bFinalizar'); if(fb) fb.disabled = !pronto;
  const fb2 = $('bFinalizarA4'); if(fb2) fb2.disabled = !pronto;
}

function manualUnit(id){ if(!souAdmin()) return; const u=pedidoAtual.unidades.find(x=>x._id===id); if(u && u.bipado<u.qtd){ u.bipado++; beep(true); renderItens(); } }

function modalAberto(){ const md=$('modal'); return md && md.classList.contains('show'); }

function onScan(code){
  if(modalAberto()) return;            // ignora bipada com o modal aberto
  code = norm(code);
  if(!code || !pedidoAtual) return;
  let q = parseInt(($('qtdConf')||{}).value,10); if(!q || q<1 || q>999) q=1;
  let u = pedidoAtual.unidades.find(x=> x.ean && norm(x.ean)===code && x.bipado<x.qtd);
  if(!u) u = pedidoAtual.unidades.find(x=> x.sku && norm(x.sku).toUpperCase()===code.toUpperCase() && x.bipado<x.qtd);
  if(u){
    const add = Math.min(q, u.qtd - u.bipado);
    u.bipado += add; beep(true); renderItens();
    const qi=$('qtdConf'); if(qi) qi.value='1';
  } else { beep(false); const s=$('scan'); if(s){ s.classList.add('err'); setTimeout(()=>s.classList.remove('err'),300);} toast('código não confere: '+code); }
}

// FINALIZAR = imprime e SÓ marca conferido depois que o estoquista confirma que saiu certo.
// modo: 'simp' = etiqueta + DANFE simplificado (10x15) na Zebra | 'a4' = etiqueta + NF completa (A4)
let modoFinalizando = 'simp';
// ── DANFE já vem COMPLETA na etiqueta? então não imprime a separada ──
// Shopee: sempre manda a DANFE completa junto → pula sempre.
// ML: combinado recém-ativado; enquanto uns pedidos vêm combinados e outros não, detecta POR
//     pedido (se o ZPL da etiqueta já contém a chave da NF, 44 díg). Quando TODO ML vier
//     combinado, é só mover 'ml' pra MKT_DANFE_SEMPRE.
// Amazon / Magalu / TikTok: NÃO mandam a DANFE completa (TikTok manda só o código de barras,
//     sem nº/série/data) → sempre imprime a DANFE completa separada.
const MKT_DANFE_SEMPRE   = ['shopee'];   // etiqueta sempre traz a DANFE completa
const MKT_DANFE_DETECTAR = ['ml'];       // combinado em transição → confirma por pedido pela chave
function etiquetaJaTemDanfe(mkt, zpl, nf){
  const m = String(mkt||'').toLowerCase();
  if(MKT_DANFE_SEMPRE.includes(m)) return true;
  {
    const chave = (nf && nf.chave) ? String(nf.chave).replace(/\D/g,'') : '';
    return chave.length >= 40 && !!zpl && String(zpl).replace(/\D/g,'').includes(chave);
  }
  return false;   // Amazon, Magalu, TikTok e qualquer outro → imprime a DANFE completa
}

async function finalizar(modo){
  // 📍 BLOQUEIO: itens sem localização precisam ser cadastrados antes de imprimir
  // (cadastro incremental — a próxima separação já vem com o local)
  if(faltaLocalizacao()){ abrirPopupLocalizacao(modo); return; }
  modoFinalizando = (modo==='a4') ? 'a4' : 'simp';
  const id = pedidoAtual.bling_id;
  const temNf = !!pedidoAtual.nf;
  // Madeira na ZEBRA: adesivo VOLUME i/N + etiqueta Correios 10x15 + DANFE-simp (ZPL montado no servidor)
  if(ehPedidoMadeira(id) && modoEtiqueta()!=='a4'){
    toast('🏷️ Imprimindo etiqueta(s) Madeira…');
    try{ await imprimirMadeiraZebra(id); }
    catch(e){ toast('Falha etiqueta Madeira: '+e.message); return; }
    abrirConfirmacao();
    return;
  }
  if(modoEtiqueta()==='a4' || ehPedidoMadeira(id)){
    // Madeira (PDF) ou modo A4: UMA aba só com etiqueta(s) + NF fundidas — Madeira multi-volume vem intercalado e carimbado
    window.open(location.origin+'/good-checkout-offline/imprimir/'+id, '_blank');
    abrirConfirmacao();
    return;
  }
  // Zebra
  if(modoFinalizando==='simp'){
    // etiqueta + DANFE → FUNDE numa etiqueta só (fallback p/ 2 se não der)

    // etiqueta na Zebra + NF completa em A4 no navegador

}

// ── 📍 LOCALIZAÇÃO OBRIGATÓRIA NO CHECKOUT ──────────────────────────────
// Se algum item do pedido está sem localização, obriga o estoquista a
// cadastrar (mín. 2 caracteres) antes de imprimir. Salva no Bling + cache
// via /salvar-localizacao — assim a próxima separação já vem com o local.
function unidadesSemLoc(){
  if(!pedidoAtual || !Array.isArray(pedidoAtual.unidades)) return [];
  const vistos = {}, out = [];
  for(const u of pedidoAtual.unidades){
    const sku = (u.sku||'').trim();
    if(!sku) continue;                       // sem SKU não dá pra salvar no Bling
    if((u.loc||'').trim()) continue;          // já tem localização
    if(vistos[sku]) continue;                 // não repete o mesmo SKU
    vistos[sku] = true; out.push(u);
  }
  return out;
}
function faltaLocalizacao(){ return unidadesSemLoc().length > 0; }

function abrirPopupLocalizacao(modo){
  const faltam = unidadesSemLoc();
  const md = $('modal');
  md.innerHTML =
    '<div class="mbox">'+
      '<div class="mtit">📍 Preencha a localização!</div>'+
      '<div class="msub">'+(faltam.length===1
        ? 'Este produto ainda não tem localização cadastrada. Informe em qual prateleira/posição ele ficará armazenado (mín. 2 caracteres). Assim, nas próximas separações o sistema já mostrará o local automaticamente.'
        : 'Estes '+faltam.length+' produtos ainda não têm localização cadastrada. Informe em qual prateleira/posição cada um ficará armazenado (mín. 2 caracteres). Assim, nas próximas separações o sistema já mostrará o local automaticamente.')+'</div>'+
      '<div class="locforce">'+
        faltam.map((u,i)=>
          '<div class="lfrow">'+
            thumb(u.img)+
            '<div class="lfinfo"><div class="lfd">'+esc(u.descricao||u.sku)+'</div><div class="lfs">SKU '+esc(u.sku)+'</div></div>'+
            '<input class="lfinp" id="lf-'+i+'" data-sku="'+esc(u.sku)+'" maxlength="20" style="text-transform:uppercase" placeholder="ex: A12" autocomplete="off" oninput="validarLocForce()" onkeydown="if(event.key===\'Enter\'){event.preventDefault();var n=document.getElementById(\'lf-\'+('+(i+1)+'));if(n){n.focus();}else{salvarLocForce(\''+modo+'\');}}" />'+
          '</div>'
        ).join('')+
      '</div>'+
      '<div class="mbtns">'+
        '<button class="btn sec" onclick="fecharPopupLocalizacao()">✗ Cancelar</button>'+
        '<button class="btn ok" id="lfok" onclick="salvarLocForce(\''+modo+'\')" disabled>✓ Salvar e imprimir</button>'+
      '</div>'+
    '</div>';
  md.classList.add('show');
  setTimeout(()=>{ const f=$('lf-0'); if(f) f.focus(); }, 60);
}
function validarLocForce(){
  let ok = true;
  document.querySelectorAll('.lfinp').forEach(inp=>{ if((inp.value||'').trim().length < 2) ok = false; });
  const b = $('lfok'); if(b) b.disabled = !ok;
}
function fecharPopupLocalizacao(){ const md=$('modal'); md.classList.remove('show'); md.innerHTML=''; setTimeout(()=>{const s=$('scan'); if(s) s.focus();},60); }
async function salvarLocForce(modo){
  const inps = Array.from(document.querySelectorAll('.lfinp'));
  for(const inp of inps){ if((inp.value||'').trim().length < 2){ toast('Preencha todas as localizações (mín. 2 caracteres)'); return; } }
  const b = $('lfok'); if(b){ b.disabled = true; b.textContent = 'Salvando…'; }
  for(const inp of inps){
    const sku = inp.getAttribute('data-sku');
    const loc = (inp.value||'').trim().toUpperCase();
    const r = await postJson('/good-checkout-offline/salvar-localizacao', { sku, localizacao: loc, op: opAtual() }).catch(()=>null);
    if(!r || r.ok===false){ toast('Falha ao salvar '+sku+' — tente de novo'); if(b){ b.disabled=false; b.textContent='✓ Salvar e imprimir'; } return; }
    if(pedidoAtual && Array.isArray(pedidoAtual.unidades)) pedidoAtual.unidades.forEach(u=>{ if((u.sku||'')===sku) u.loc = loc; });
  }
  toast('✓ Localização(ões) salva(s)');
  fecharPopupLocalizacao();
  finalizar(modo);   // agora passa no bloqueio e segue pra impressão
}

// ─── Histórico dos últimos finalizados (modal) ─────────────────────────────
let histItens = [];
let histMkt = '';
async function abrirHistorico(){
  histMkt = '';
  const md=$('modal');
  md.innerHTML =
    '<div class="mbox" style="max-width:580px;width:92vw">'+
      '<button class="mx" onclick="fecharConfirmacao()" title="fechar">✕</button>'+

      '<select id="histMktSel" class="buscafld" style="margin-bottom:10px" onchange="histMkt=this.value;filtrarHist()"><option value="">Todos os marketplaces</option></select>'+

// monta as opções do filtro de marketplace só com os que aparecem no histórico (com contagem)
function montarFiltroMkt(){
  const ordem = ['ml','shopee','amazon','magalu','tiktok','outro'];
  const presentes = [...new Set(histItens.map(h => h.marketplace || 'outro'))].sort((a,b)=>ordem.indexOf(a)-ordem.indexOf(b));
  let html = '<option value="">Todos ('+histItens.length+')</option>';
  for(const mk of presentes){
    const n = (MKT[mk]||MKT.outro).n;
    const qt = histItens.filter(h=>(h.marketplace||'outro')===mk).length;
    html += '<option value="'+mk+'">'+n+' ('+qt+')</option>';
  }
  const sel = $('histMktSel');
  if(sel){ sel.innerHTML = html; sel.value = histMkt; }
}
function filtrarHist(){
  const q = (($('histBusca')||{}).value||'').trim().toLowerCase();
  let lista = histItens;
  if(histMkt) lista = lista.filter(h => (h.marketplace||'outro')===histMkt);
  if(q) lista = lista.filter(h => (String(h.numero||h.id)+' '+(h.cliente||'')).toLowerCase().includes(q));
  renderHist(lista);
}
let histFlexOnly = false;
function toggleHistFlex(){ histFlexOnly = !histFlexOnly; const b=$('histFlexBtn'); if(b) b.classList.toggle('on', histFlexOnly); filtrarHist(); }
let histPendOnly = false;
function toggleHistPend(){ histPendOnly = !histPendOnly; const b=$('histPendBtn'); if(b) b.classList.toggle('on', histPendOnly); filtrarHist(); }
let histAberto = null;   // pedido com dropdown de detalhes aberto
function toggleHistDet(id){ histAberto = (histAberto===id) ? null : id; filtrarHist(); }
let histReenvios = {};   // solicitações de reenvio pendentes (id → {por, em})
async function pedirReenvio(id, numero){
  if(!confirm('Marcar o pedido '+numero+' como PRECISA DE REENVIO (etiqueta/NF rasgada/suja)?\n\nEle fica sinalizado em VERMELHO no histórico. O admin recebe o aviso e reenvia os documentos. Você só sinaliza — não envia nada.')) return;
  try{
    const r = await postJson('/good-checkout-offline/pedir-reenvio/'+encodeURIComponent(id), { op: opAtual() });
    if(r && r.direto) toast(r.ok ? '📧 Enviado pro e-mail do estoque!' : 'Falha: '+(r.erro||'?'));
    else if(r && r.ok) toast('📨 Solicitação registrada — o admin envia em seguida.');
    else toast('Falha: '+((r&&r.erro)||'?'));
  }catch(e){ toast('Falha: '+e.message); }
  abrirHistorico();
}
async function resolverReenvio(id, enviar){
  try{
    const r = await postJson('/good-checkout-offline/reenvio-resolver/'+encodeURIComponent(id), { op: opAtual(), enviar: !!enviar });
    if(enviar) toast(r && r.ok ? '📧 Enviado pro estoque!' : 'Falha: '+((r&&r.erro)||'?'));
    else toast('Solicitação descartada.');
  }catch(e){ toast('Falha: '+e.message); }
  abrirHistorico();
}
function renderHist(lista){
  if(histFlexOnly) lista = lista.filter(h=>!!h.flex);
  if(histPendOnly) lista = lista.filter(h=>histReenvios && histReenvios[h.id]);
  lista = lista.slice().sort((a,b)=>{ const fa=(histReenvios&&histReenvios[a.id])?1:0, fb=(histReenvios&&histReenvios[b.id])?1:0; return fa!==fb ? fb-fa : String(b.conferido_em||'').localeCompare(String(a.conferido_em||'')); });
  const pend = Object.keys(histReenvios||{}).length;
  const ri = $('histReeInfo'); if(ri) ri.textContent = pend ? ('📨 '+pend+' aguardando seu envio') : '';
  const pb = $('histPendBtn'); if(pb){ pb.textContent = '📨 Pendentes'+(pend?' ('+pend+')':''); pb.style.display = pend? '' : 'none'; }
  if(!lista.length){ $('histBody').innerHTML='<div class="sepempty">'+(histItens.length?'Nenhum resultado pro filtro.':'Nenhum pedido finalizado ainda.')+'</div>'; return; }
  $('histBody').innerHTML = lista.map(h=>{
    const dt = h.conferido_em ? new Date(h.conferido_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    const mk = h.marketplace ? (MKT[h.marketplace]||MKT.outro) : null;
    const tag = h.sincronizado ? '<span class="hsync ok">✓ VERIFICADO</span>' : '<span class="hsync wait">⏳ na fila</span>';
    const aberto = (histAberto===h.id);
    const ree = histReenvios && histReenvios[h.id];
    const its0 = h.itens||[];
    const resumo = (h.nf_numero?('NF '+esc(h.nf_numero)+' · '):'')+(its0.length?((its0[0].qtd||1)+'× '+esc(its0[0].sku||'?')+(its0.length>1?' +'+(its0.length-1):'')+' · '):'');
    let det = '';
    if(aberto){
      const its = h.itens||[];
      det = '<div class="histdet">'+
        '<div>'+(mk?esc(mk.n):'')+(h.servico?' · '+esc(h.servico):'')+(h.flex?' · <b>⚡ FLEX</b>':'')+(h.nf_numero?' · NF '+esc(h.nf_numero):'')+'</div>'+
        (h.cliente?'<div>👤 '+esc(h.cliente)+'</div>':'')+
        (its.length
          ? its.map(it=>'<div class="histit"><b>'+(it.qtd||1)+'×</b> '+esc(it.sku||'?')+(it.descricao?' — '+esc(it.descricao):'')+'</div>').join('')
          : '<div class="histit" style="opacity:.6">sem detalhes de itens (pedido finalizado antes desta atualização)</div>')+
      '</div>';
    }
    return '<div class="histrow'+(ree?' reepend':'')+'" style="cursor:pointer" onclick="toggleHistDet(\''+esc(h.id)+'\')">'+
      (mk?'<span class="hmk" style="background:'+mk.c+'"></span>':'')+
      '<div class="hmeta">'+
        '<div class="hnum">'+(h.flex?'⚡ ':'')+esc(h.numero||h.id)+(h.cliente?' · '+esc(h.cliente):'')+'</div>'+
        '<div class="hsub">'+resumo+dt+(h.user?(' · '+esc(h.user)):'')+' · '+(aberto?'▲ fechar':'▼ detalhes')+'</div>'+
      '</div>'+
      (ree?'<span class="reebadge" title="solicitado por '+esc(ree.por||'?')+' em '+esc((ree.em||'').slice(0,16).replace('T',' '))+'">📨 REENVIO</span>':'')+
      tag+
      (!ree?'<button class="btn sec sm" onclick="event.stopPropagation();pedirReenvio(\''+h.id+'\',\''+esc(h.numero||h.id)+'\')" title="etiqueta rasgou/sujou? sinaliza que este pedido precisa de reenvio">📨</button>':'')+
      (ree&&souAdmin()?'<button class="btn sec sm" onclick="event.stopPropagation();resolverReenvio(\''+h.id+'\',true)" title="enviar etiqueta+NF pro e-mail do estoque e baixar a solicitação">✉ Enviar</button>':'')+
      (ree&&souAdmin()?'<button class="btn sec sm" onclick="event.stopPropagation();resolverReenvio(\''+h.id+'\',false)" title="descartar a solicitação sem enviar">✕</button>':'')+
      (souAdmin()?'<button class="btn sec sm" onclick="event.stopPropagation();enviarDocs(\''+h.id+'\',\''+esc(h.numero||h.id)+'\')" title="ADMIN: enviar etiqueta + NF pro e-mail do estoque agora">📧</button>':'')+
      (souAdmin()?'<button class="btn warn sm" onclick="event.stopPropagation();reabrirPedido(\''+h.id+'\',\''+esc(h.numero||h.id)+'\')">↩ Reabrir</button>':'')+
    '</div>'+det;
  }).join('');
}

// edição de localização inline (lápis) — qualquer funcionário pode; o servidor registra quem editou
function editarLoc(i){
  const l = sepLinhas[i]; if(!l) return;
  if(!l.sku || l.sku === '(sem SKU)'){ toast('Esse item não tem SKU pra editar'); return; }
  const row = $('seprow-'+i); if(!row) return;
  row.innerHTML =
    '<input class="locedit" id="locinp-'+i+'" value="'+esc(l.loc||'')+'" placeholder="localização" autocomplete="off" />'+
    '<button class="btn ok sm" onclick="salvarLoc('+i+')">✓</button>'+
    '<button class="btn sec sm" onclick="carregarSeparacao()">✗</button>'+
    '<div class="meta"><div class="sku">'+esc(l.sku)+'</div></div>';
  const inp = $('locinp-'+i); inp.focus(); inp.select();
  inp.onkeydown = e => { if(e.key==='Enter'){ e.preventDefault(); salvarLoc(i); } if(e.key==='Escape') carregarSeparacao(); };
}
async function salvarLoc(i){
  const l = sepLinhas[i]; if(!l) return;
  const inp = $('locinp-'+i); if(!inp) return;
  const nova = inp.value.trim().toUpperCase();
  inp.disabled = true;
  const r = await postJson('/good-checkout-offline/salvar-localizacao', { sku: l.sku, localizacao: nova, op: opAtual() }).catch(()=>null);
  if(r && r.ok){ toast('✓ '+l.sku+' → '+(nova||'(vazio)')); carregarSeparacao(); }
  else { toast('Não salvou: '+((r&&r.erro)||'erro')); inp.disabled = false; inp.focus(); }
}

  if(!r || !r.ok){ $('buscaRes').innerHTML = '<div class="sepempty">'+esc((r&&r.erro)||'não encontrado')+'</div>'; buscaProd=null; return; }
  const p = r.produto; buscaProd = p;
  $('buscaRes').innerHTML =
    '<div class="bcard">'+
      (p.img?'<img class="bimg" src="'+esc(p.img)+'" onclick="abrirImagem(this.src)" onerror="this.style.display=\'none\'" />':'<div class="bimg vazio">📦</div>')+
      '<div>'+
        '<div class="bnome">'+esc(p.nome||'(sem nome)')+'</div>'+
        '<div class="bsku">SKU '+esc(p.sku||'—')+'</div>'+
        '<div class="bsub">EAN '+esc(p.ean||'—')+' · estoque <b>'+(p.estoque!=null?p.estoque:'?')+'</b></div>'+
      '</div>'+
    '</div>'+
    '<div class="bloc-atual" id="blocAtual">📍 Localização atual: '+
      (p.localizacao ? '<b>'+esc(p.localizacao)+'</b>' : '<span class="semloc">sem localização cadastrada</span>')+
    '</div>'+
    '<div class="bloc">'+
      '<label>✏️ Editar localização (salva no Bling)</label>'+
      '<div style="display:flex;gap:8px">'+
        '<input id="buscaLoc" class="buscafld" style="text-transform:uppercase" value="'+esc(p.localizacao||'')+'" placeholder="nova localização" autocomplete="off" onkeydown="if(event.key===\'Enter\')salvarLocBusca()" />'+
        '<button class="btn ok" onclick="salvarLocBusca()">✓ Salvar</button>'+
      '</div>'+
    '</div>';
  const b=$('buscaInp'); if(b) b.select();
}
async function salvarLocBusca(){
  if(!buscaProd || !buscaProd.sku){ toast('Busca um produto primeiro'); return; }
  const nova = (($('buscaLoc')||{}).value||'').trim().toUpperCase();
  const r = await postJson('/good-checkout-offline/salvar-localizacao', { sku: buscaProd.sku, localizacao: nova, op: opAtual() }).catch(()=>null);
  if(r && r.ok){
    toast('✓ '+buscaProd.sku+' → '+(nova||'(vazio)')); buscaProd.localizacao = nova;
    const ba = $('blocAtual');
    if(ba) ba.innerHTML = '📍 Localização atual: '+(nova ? '<b>'+esc(nova)+'</b>' : '<span class="semloc">sem localização cadastrada</span>');
  }
  else { toast('Não salvou: '+((r&&r.erro)||'erro')); }
}

// ── ETIQUETA DE PRODUTO (cód de barras 4x2,5cm na Zebra, via QZ Tray — gerada por nós, não puxada do Bling) ──
async function getImpressoraEtiqueta(){
  let p = localStorage.getItem('gbkp_printer_etq');
  if(p) return p;
  p = localStorage.getItem('gbkp_printer');     // cai na Zebra da postagem se não tiver uma separada
  if(p) return p;
  const lista = await qz.printers.find();
  return (lista||[]).find(n=>/zebra|zdesigner|zpl|\bzd\b|\bgk\b|\bgc\b/i.test(n)) || (lista||[])[0];
}
async function escolherImpressoraEtiqueta(){
  try{
    await conectarQZ();
    const lista = await qz.printers.find();
    if(!lista||!lista.length){ toast('Nenhuma impressora no QZ'); return; }
    const atual = localStorage.getItem('gbkp_printer_etq')||'';
    const msg = 'Impressoras:\n\n'+lista.map((n,i)=>(i+1)+') '+n+(n===atual?'  ← atual':'')).join('\n')+'\n\nNº da impressora da ETIQUETA de produto (4x2,5cm):';
    const r = prompt(msg, lista.indexOf(atual)>=0?String(lista.indexOf(atual)+1):'1');
    const idx = parseInt(r,10)-1;
    if(idx>=0&&idx<lista.length){ localStorage.setItem('gbkp_printer_etq', lista[idx]); toast('Impressora etiqueta: '+lista[idx]); }
  }catch(e){ toast('Erro: '+e.message); }
}
// 40x25mm @ 203dpi = 320x200 dots. Título até 3 linhas, SKU, código de barras Code128 do EAN + número embaixo.
function montarZplEtiqueta(p, copias){
  const clean = s => String(s||'').replace(/[\^~]/g,' ');
  const titulo = clean(p.nome).slice(0,72);          // 72 chars garantem no máx. 3 linhas (ZPL sobrepõe o excesso na última linha!)
  const sku = clean(p.sku);
  const ean = String(p.ean||'').replace(/\D/g,'');
  const dados = ean || sku.replace(/[^\x20-\x7E]/g,'');     // barras: EAN; se não tiver, o SKU
  if(!dados) return null;
  // margens: 2,5mm esq/topo, ~5mm dir (compensa offset físico), ~1,5mm baixo
  const wSku = Math.max(10, Math.min(24, Math.floor(370/Math.max(sku.length,1))));  // SKU auto-encolhe pra caber na largura
  // barras CENTRALIZADAS: Code128 não estica (só degraus de 50%) → estima a largura real e centraliza; o número alinha junto
  const digitos = /^\d+$/.test(dados);
  const simbolos = digitos ? (Math.floor(dados.length/2) + (dados.length%2?2:0) + 2) : (dados.length+2);
  const wBar = (11*simbolos + 13)*2;                        // largura estimada das barras (dots)
  const xBar = Math.max(20, 20 + Math.floor((284-wBar)/2));
  const z = ['^XA','^CI28','^PW320','^LL200','^LH0,0',
    '^FO20,24^A0N,14,14^FB284,3,2,L^FD'+titulo+'^FS',       // título (letra menor, até 3 linhas)
    '^FO20,80^A0N,24,'+wSku+'^FD'+sku+'^FS',                // SKU
    '^FO'+xBar+',112^BY2,2^BCN,56,N,N,N,A^FD'+dados+'^FS',  // código de barras (modo A, centralizado)
    '^FO20,172^A0N,17,17^FB284,1,0,C^FD'+dados+'^FS'];      // número embaixo, centralizado
  if(copias && copias>1) z.push('^PQ'+copias+',0,0,N');     // nº de cópias
  z.push('^XZ');
  return z.join('');
}
// prod opcional (cai no buscaProd); copias opcional (pergunta se não vier)
async function imprimirEtiquetaProduto(prod, copias){
  const p = prod || buscaProd;
  if(!p){ toast('Busca um produto primeiro'); return; }
  if(copias == null){
    const r = prompt('Quantas cópias da etiqueta?', '1');
    if(r === null) return;                                  // cancelou
    copias = Math.max(1, Math.min(50, parseInt(r,10)||1));
  }
  const zpl = montarZplEtiqueta(p, copias);
  if(!zpl){ toast('Produto sem EAN nem SKU pra etiqueta'); return; }
  try{
    await conectarQZ();
    const printer = await getImpressoraEtiqueta();
    if(!printer){ toast('Sem impressora — clica no 🖨 pra escolher'); return; }
    const cfg = qz.configs.create(printer);
    await qz.print(cfg, [{ type:'raw', format:'command', flavor:'plain', data: zpl }]);
    toast('🏷️ '+copias+'x enviada(s) → '+printer);
  }catch(e){ toast('Erro na impressão: '+e.message); }
}
// botão 🏷️ da linha de separação
function imprimirEtiquetaLinha(i){
  const l = sepLinhas[i]; if(!l) return;
  if(!l.sku || l.sku === '(sem SKU)'){ toast('Esse item não tem SKU pra etiqueta'); return; }
  imprimirEtiquetaProduto({ nome: l.descricao, sku: l.sku, ean: l.ean });
}

// ── indexação total do catálogo (admin) — deixa todo EAN achável na hora ──
let pollIdxTimer = null;
async function indexarCatalogo(){
  if(!souAdmin()){ toast('Só admin'); return; }
  if(!confirm('Indexar o catálogo inteiro?\n\nVarre todos os produtos pra que qualquer EAN passe a achar na hora. Pode levar alguns minutos e roda em segundo plano — pode fechar a janela.')) return;
  const r = await api('/good-checkout-offline/indexar-catalogo?op='+encodeURIComponent(opAtual())).catch(()=>null);
  if(!r || !r.ok){ toast('Não iniciou: '+((r&&r.erro)||'erro')); return; }
  toast('Indexação iniciada…');
  pollIndexar();
}
async function pollIndexar(){
  clearTimeout(pollIdxTimer);
  const r = await api('/good-checkout-offline/indexar-status').catch(()=>null);
  const st = r && r.status, el = $('idxStatus');
  if(!st || !el) return;
  if(st.rodando){
    el.textContent = '⏳ indexando… '+st.feitos+' produtos · '+st.eans+' EANs';
    pollIdxTimer = setTimeout(pollIndexar, 2500);
  } else if(st.em){
    el.textContent = '✅ índice pronto: '+st.feitos+' produtos · '+st.eans+' EANs'+(st.erro?(' (erro: '+st.erro+')'):'');
  }
}

function renderSepChips(counts){
  const tot = Object.values(counts).reduce((s,n)=>s+n,0);
  let html = sepChip('Todos', tot, null, '#94a3b8');
  MKT_ORDEM.forEach(mk=>{ if(counts[mk]) html += sepChip((MKT[mk]||MKT.outro).n, counts[mk], mk, (MKT[mk]||MKT.outro).c); });
  $('sepChips').innerHTML = html;
}
function sepChip(label, n, val, cor){
  const on = (sepMkt===val);
  return '<span class="chip'+(on?' on':'')+'" onclick="setSepMkt('+(val?("'"+val+"'"):'null')+')">'+
         '<span style="width:8px;height:8px;border-radius:50%;background:'+cor+';display:inline-block"></span>'+
         label+' <b>'+n+'</b></span>';
}

    '<div style="display:flex;justify-content:space-between;align-items:baseline"><h1>Lista de Separação</h1><div class="sub">'+agora+'</div></div>'+
    '<div class="sub"><b>'+filtroNome+'</b> &middot; '+sepData.total_skus+' SKU(s) &middot; '+sepData.total_itens+' a separar &middot; '+sepData.pedidos+' pedido(s)</div>'+

function imprimirSepPedido(){

// mantém o foco no campo de bipar — mas SÓ dentro de um pedido aberto, e NUNCA rouba o foco
// se um diálogo está aberto, se você já está em qualquer campo, ou se está selecionando texto.
setInterval(()=>{
  if(!pedidoAtual) return;                                          // fora de um pedido (ex: login, lista) → não toca no foco
  if(modalAberto()) return;                                         // diálogo de confirmação aberto
  const ae = document.activeElement;
  if(ae && /^(INPUT|SELECT|TEXTAREA)$/.test(ae.tagName)) return;    // já está digitando em algum campo → não rouba
  const sel = window.getSelection && window.getSelection().toString();
  if(sel) return;                                                   // selecionando texto (ex: copiar código) → não rouba
  const s=$('scan'); if(s) s.focus();
}, 1500);

// a página NUNCA se imprime — toda impressão é via QZ Tray (Zebra ou A4)
window.print = function(){ toast('A impressão é pela impressora (QZ Tray), não pela página'); };
document.addEventListener('keydown', e=>{ if((e.ctrlKey||e.metaKey) && (e.key==='p'||e.key==='P')){ e.preventDefault(); e.stopPropagation(); toast('A impressão é pelos botões (QZ Tray)'); } }, true);

aplicarModoLabel();
checarLogin();   // gate de login → ele carrega a lista assim que liberar
setInterval(()=>{ if(!pedidoAtual && (!loginAtivo || localStorage.getItem('gbkp_logado')==='1')) carregarLista(); }, 20000);
