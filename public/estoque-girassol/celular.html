  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Girassol" />
  <meta name="theme-color" content="#ffc704" />
  <style>
    :root {
      --verde: #075d00;
      --verde-btn: #0a7a02;
      --girassol-amarelo: #ffc704;
      --girassol-verde: #075d00;
      --verde-light: #edf8ee;
      --vermelho: #c62828;
      --vermelho-light: #fff2f2;
      --cinza-bg: #f0f2f0;
      --cinza-card: #ffffff;
      --cinza-borda: #dde1dd;
      --texto: #1a1a1a;
      --texto-leve: #555;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0; padding: 0;
      background: var(--cinza-bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--texto);
      min-height: 100vh;
    }

    /* TOPO */
    .topo {
      position: sticky; top: 0; z-index: 100;
      background: var(--verde);
      padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .topo h1 { margin: 0; font-size: 17px; font-weight: 700; color: #fff; }
    #btnSairTopo {
      display: none;
      background: rgba(255,255,255,0.15); color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px; padding: 6px 14px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }

    /* CONTAINER */
    .container {
      padding: 12px 16px;
      max-width: 480px;
      margin: 0 auto;
      height: calc(100vh - 52px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sistema {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    /* TOAST */
    #toast {
      position: fixed; top: 68px; left: 50%; transform: translateX(-50%);
      padding: 12px 20px; border-radius: 10px;
      color: white; font-size: 15px; font-weight: 600;
      z-index: 9999; display: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.22);
      max-width: 88vw; text-align: center;
    }
    .toast-ok   { background: var(--verde-btn); }
    .toast-erro { background: var(--vermelho); }

    /* INPUTS */
    input[type="text"], input[type="password"] {
      width: 100%; padding: 14px 16px; font-size: 16px;
      border: 1.5px solid var(--cinza-borda);
      border-radius: var(--radius);
      background: #fafafa; color: var(--texto);
      outline: none; margin-bottom: 12px;
      transition: border-color 0.2s, background 0.2s;
    }
    input:focus { border-color: var(--verde-btn); background: #fff; }
    .status-busca-ok   { border-color: var(--verde-btn) !important; background: var(--verde-light) !important; }
    .status-busca-erro { border-color: var(--vermelho) !important; background: var(--vermelho-light) !important; }

    /* SENHA */
    .campo-senha-wrap { position: relative; margin-bottom: 12px; }
    .campo-senha-wrap input { margin-bottom: 0; padding-right: 52px; }
    .btn-olho {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px;
    }

    /* CHECKBOX */
    .linha-checkbox {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; color: var(--texto-leve);
      margin-bottom: 16px; cursor: pointer;
    }
    .linha-checkbox input[type="checkbox"] {
      width: 18px; height: 18px; margin: 0;
      accent-color: var(--verde-btn); cursor: pointer;
    }

    /* BOTÕES */
    .btn {
      width: 100%; padding: 13px; font-size: 15px; font-weight: 700;
      border: none; border-radius: var(--radius); cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-bottom: 0;
    }
    .btn:active { opacity: 0.85; transform: scale(0.98); }
    .btn-primario { background: var(--verde-btn); color: #fff; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* LINHA COM INPUT + BOTÃO */
    .linha-acao {
      display: flex; gap: 8px; align-items: stretch; margin-bottom: 10px;
    }
    .linha-acao input {
      flex: 1; margin-bottom: 0;
    }
    .linha-acao .btn {
      width: auto; white-space: nowrap; padding: 0 18px; flex-shrink: 0;
    }

    /* CARD PRODUTO */
    .card {
      background: var(--cinza-card); border-radius: var(--radius);
      padding: 10px 12px; box-shadow: var(--shadow); margin-bottom: 10px;
    }
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 10px;
      margin-top: 6px;
    }
    .campo-info { }
    .campo-info label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--texto-leve);
      display: block; margin-bottom: 2px;
    }
    .campo-info .valor {
      font-size: 14px; font-weight: 600; color: var(--texto);
      min-height: 20px; word-break: break-word;
    }
    .campo-info.full { grid-column: 1 / -1; }

    /* IMAGEM */
    #imgWrap {
      display: none;
      background: #f8f8f8; border: 1px solid var(--cinza-borda);
      border-radius: var(--radius); padding: 8px;
      text-align: center; margin-bottom: 10px;
      flex: 1;
      min-height: 80px;
      max-height: 40vh;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #imagem {
      max-width: 100%;
      max-height: 100%;
      border-radius: 6px; object-fit: contain;
      display: block; margin: 0 auto;
    }

    /* SEÇÃO LABEL */
    .secao-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--texto-leve);
      margin: 0 0 6px;
    }

    /* LOGIN BOX */
    #loginBox {
      background: var(--cinza-card); border-radius: var(--radius);
      padding: 24px 16px; box-shadow: var(--shadow); margin-top: 8px;
    }

    /* ===== Botão câmera ===== */
    .btn-cam {
      background: #fff;
      color: var(--verde);
      border: 2px solid var(--verde);
      border-radius: 8px;
      padding: 0;
      width: 48px; min-width: 48px;
      height: 48px;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-cam:active { background: #e8f5e9; }

    /* ===== Modal scanner ===== */
    #modalScanner {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #modalScanner.aberto { display: flex; }
    #modalScanner .scanner-topo {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #fff;
      background: rgba(0,0,0,0.5);
    }
    #modalScanner .scanner-topo h3 { margin: 0; font-size: 16px; }
    #modalScanner .scanner-fechar {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 50%;
      width: 40px; height: 40px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
    }
    #leitorCam {
      width: 100%;
      max-width: 500px;
      max-height: 70vh;
    }
    #leitorCam video {
      border-radius: 12px;
    }
    #scannerMsg {
      color: #fff;
      margin-top: 16px;
      padding: 0 20px;
      text-align: center;
      font-size: 14px;
    }

  </style>
</head>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox">
    <p class="secao-label" style="margin-bottom:14px;">Acesso ao sistema</p>

    <input type="text" id="usuario" placeholder="Usuário" autocomplete="username" />

    <div class="campo-senha-wrap">
      <input type="password" id="senha" placeholder="Senha" autocomplete="current-password" />
      <button type="button" class="btn-olho" onclick="toggleSenha()">👁</button>
    </div>

    <label class="linha-checkbox">
      <input type="checkbox" id="chkMostrarSenha" onchange="toggleSenhaPorCheckbox()" />
      Mostrar senha
    </label>

    <button class="btn btn-primario" id="btnEntrar" onclick="login()">Entrar</button>
  </div>

  <!-- SISTEMA -->
  <div id="sistema">

    <div class="linha-acao">
      <input
        type="text" id="sku"
        placeholder="Bipar EAN ou digitar SKU"
        inputmode="text" autocomplete="off"
        onkeypress="if(event.key==='Enter'){buscar();}"
      />
      <button class="btn-cam" id="btnCam" onclick="abrirScanner()" title="Ler código de barras com a câmera">📷</button>
      <button class="btn btn-primario" id="btnBuscar" onclick="buscar()">Buscar</button>
    </div>

    <div class="card">
      <div class="card-grid">
        <div class="campo-info full">
          <label>Produto</label>
          <div class="valor" id="nome">—</div>
        </div>
        <div class="campo-info">
          <label>SKU</label>
          <div class="valor" id="codigo">—</div>
        </div>
        <div class="campo-info">
          <label>EAN</label>
          <div class="valor" id="ean">—</div>
        </div>
        <div class="campo-info">
          <label>Estoque</label>
          <div class="valor" id="estoque">—</div>
        </div>
        <div class="campo-info">
          <label>Local atual</label>
          <div class="valor" id="local">—</div>
        </div>
      </div>
    </div>

    <div id="imgWrap">
      <img id="imagem" alt="Imagem do produto" />
    </div>

    <div class="linha-acao">
      <input
        type="text" id="novoLocal"
        placeholder="Nova localização"
        autocomplete="off"
        readonly
        onkeypress="if(event.key==='Enter'){salvar();}"
      />
      <button class="btn btn-primario" id="btnSalvar" onclick="salvar()">Salvar</button>
    </div>

  </div>
</div>

<!-- ===== MODAL SCANNER (câmera) ===== -->
<div id="modalScanner">
  <div class="scanner-topo">
    <h3>📷 Aponte para o código de barras</h3>
    <button class="scanner-fechar" onclick="fecharScanner()" aria-label="Fechar">✕</button>
  </div>
  <div id="leitorCam"></div>
  <div id="scannerMsg">Mantenha o código dentro do quadro</div>
</div>

<!-- Biblioteca de scanner (CDN) -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<audio id="somOk" preload="auto">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script>
  const API_KEY = "GIRASSOL_ESTOQUE_GIRASSOL_2026";
  let codigoProdutoAtual = null;
  const DURACAO_LOGIN_MS = 24 * 60 * 60 * 1000;

  // ===== TOAST =====
  function mostrarToast(msg, tipo) {
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.className = tipo === "ok" ? "toast-ok" : "toast-erro";
    toast.style.display = "block";
    clearTimeout(toast._t);
    toast._t = setTimeout(() => { toast.style.display = "none"; }, 2400);
  }

  // ===== SOM =====
  function tocarSom(tipo) {
    if (tipo === "ok") {
      const som = document.getElementById("somOk");
      if (som) { som.currentTime = 0; som.play().catch(() => {}); }
      return;
    }
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      const ctx = new Ctx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(260, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(120, ctx.currentTime + 0.35);
      gain.gain.setValueAtTime(0.001, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.38);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.38);
    } catch(e) {}
  }

  function vibrarOk()   { if (navigator.vibrate) navigator.vibrate([80, 40, 80]); }
  function vibrarErro() { if (navigator.vibrate) navigator.vibrate([200, 100, 200]); }

  // ===== STATUS CAMPO =====
  function marcarCampoBusca(tipo) {
    const campo = document.getElementById("sku");
    campo.classList.remove("status-busca-ok", "status-busca-erro");
    if (tipo === "ok")   campo.classList.add("status-busca-ok");
    if (tipo === "erro") campo.classList.add("status-busca-erro");
  }

  // ===== LIMPAR =====
  function limparPainelProduto() {
    ["nome","codigo","ean","estoque","local"].forEach(id => {
      document.getElementById(id).innerText = "—";
    });
    document.getElementById("imagem").src = "";
    document.getElementById("imgWrap").style.display = "none";
    codigoProdutoAtual = null;
  }

  function limparTudoAposSalvar() {
    document.getElementById("sku").value = "";
    document.getElementById("novoLocal").value = "";
    limparPainelProduto();
    marcarCampoBusca("");
    // não abre teclado após salvar
  }

  // ===== SESSÃO =====
  function salvarSessao(usuario) {
    localStorage.setItem("bling_login", JSON.stringify({
      usuario, expiraEm: Date.now() + DURACAO_LOGIN_MS
    }));
  }

  function obterSessao() {
    try {
      const s = JSON.parse(localStorage.getItem("bling_login") || "null");
      if (!s || Date.now() > s.expiraEm) {
        localStorage.removeItem("bling_login");
        return null;
      }
      return s;
    } catch {
      localStorage.removeItem("bling_login");
      return null;
    }
  }

  function aplicarLoginNaTela() {
    document.getElementById("sistema").style.display = "flex";
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("tituloPagina").innerText = "Girassol x Localização";
    document.getElementById("logoTopo").style.display = "block";
    document.getElementById("btnSairTopo").style.display = "inline-block";
    document.getElementById("sku").focus();
  }

  function sair() {
    localStorage.removeItem("bling_login");
    location.reload();
  }

  // ===== SENHA =====
  function definirTipoSenha(visivel) {
    document.getElementById("senha").type = visivel ? "text" : "password";
    document.getElementById("chkMostrarSenha").checked = visivel;
  }
  function toggleSenha() {
    definirTipoSenha(document.getElementById("senha").type === "password");
  }
  function toggleSenhaPorCheckbox() {
    definirTipoSenha(document.getElementById("chkMostrarSenha").checked);
  }

  // ===== LOGIN =====
  async function login() {
    const usuario = (document.getElementById("usuario").value || "").trim();
    const senha   = document.getElementById("senha").value || "";
    const btn     = document.getElementById("btnEntrar");

    if (!usuario || !senha) {
      mostrarToast("Preencha usuário e senha", "erro");
      return;
    }

    btn.disabled = true;
    btn.innerText = "Entrando...";

    try {
      const r = await fetch("/estoque-girassol/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ usuario, senha })
      });
      const d = await r.json().catch(() => ({}));

      if (r.ok && d.sucesso) {
        salvarSessao(usuario);
        aplicarLoginNaTela();
        mostrarToast("Login realizado com sucesso", "ok");
        tocarSom("ok");
      } else {
        tocarSom("erro"); vibrarErro();
        mostrarToast(d.mensagem || "Usuário ou senha inválidos", "erro");
      }
    } catch(e) {
      tocarSom("erro"); vibrarErro();
      mostrarToast("Erro de conexão: " + e.message, "erro");
    } finally {
      btn.disabled = false;
      btn.innerText = "Entrar";
    }
  }

  // ===== BUSCAR =====
  async function buscar() {
    const codigoDigitado = (document.getElementById("sku").value || "").trim();
    const btn = document.getElementById("btnBuscar");

    if (codigoDigitado.length < 2) {
      marcarCampoBusca("erro");
      tocarSom("erro"); vibrarErro();
      mostrarToast("Digite ao menos 2 caracteres", "erro");
      return;
    }

    limparPainelProduto();
    marcarCampoBusca("");
    btn.disabled = true;
    btn.innerText = "Buscando...";

    try {
      // Tenta SKU primeiro
      let r = await fetch(
        "/estoque-girassol/buscar?key=" + encodeURIComponent(API_KEY) +
        "&tipo=SKU&codigo=" + encodeURIComponent(codigoDigitado)
      );
      let d = await r.json().catch(() => ({ ok: false }));

      // Se não achou, tenta EAN
      if (!d.ok || !d.produto) {
        r = await fetch(
          "/estoque-girassol/buscar?key=" + encodeURIComponent(API_KEY) +
          "&tipo=EAN&codigo=" + encodeURIComponent(codigoDigitado)
        );
        d = await r.json().catch(() => ({ ok: false }));
      }

      if (!d.ok || !d.produto) {
        marcarCampoBusca("erro");
        tocarSom("erro"); vibrarErro();
        mostrarToast(d.erro || "Produto não encontrado", "erro");
        return;
      }

      const p = d.produto;
      document.getElementById("nome").innerText    = p.nome        || "—";
      document.getElementById("codigo").innerText  = p.codigo      || "—";
      document.getElementById("ean").innerText     = p.ean         || "—";
      document.getElementById("estoque").innerText = p.estoque != null ? p.estoque : "—";
      document.getElementById("local").innerText   = p.localizacao || "—";

      codigoProdutoAtual = p.codigo || null;

      const img     = document.getElementById("imagem");
      const imgWrap = document.getElementById("imgWrap");
      if (p.imagem) {
        img.src = p.imagem;
        imgWrap.style.display = "flex";
      } else {
        imgWrap.style.display = "none";
      }

      marcarCampoBusca("ok");
      tocarSom("ok");
      mostrarToast("Produto encontrado", "ok");
      // foco com readOnly: coletor funciona, teclado virtual não abre
      const novoLocalEl = document.getElementById("novoLocal");
      novoLocalEl.setAttribute("readonly", true);
      novoLocalEl.focus();

    } catch(e) {
      marcarCampoBusca("erro");
      tocarSom("erro"); vibrarErro();
      mostrarToast("Erro ao buscar: " + e.message, "erro");
    } finally {
      btn.disabled = false;
      btn.innerText = "Buscar";
    }
  }

  // ===== SALVAR =====
  async function salvar() {
    const sku       = codigoProdutoAtual || (document.getElementById("sku").value || "").trim();
    const novoLocal = (document.getElementById("novoLocal").value || "").trim();
    const btn       = document.getElementById("btnSalvar");

    if (!sku || sku.length < 2) {
      tocarSom("erro"); vibrarErro();
      mostrarToast("Busque um produto antes de salvar", "erro");
      return;
    }

    if (!novoLocal) {
      tocarSom("erro"); vibrarErro();
      mostrarToast("Digite a nova localização", "erro");
      // foco com readOnly: coletor funciona, teclado virtual não abre
      const novoLocalEl = document.getElementById("novoLocal");
      novoLocalEl.setAttribute("readonly", true);
      novoLocalEl.focus();
      return;
    }

    btn.disabled = true;
    btn.innerText = "Salvando...";

    try {
      const r = await fetch("/estoque-girassol/salvar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key: API_KEY, codigo: sku, novaLocalizacao: novoLocal })
      });
      const d = await r.json().catch(() => ({ ok: false, erro: "Resposta inválida do servidor" }));

      if (!d.ok) {
        tocarSom("erro"); vibrarErro();
        mostrarToast(d.erro || "Erro ao salvar", "erro");
        return;
      }

      tocarSom("ok"); vibrarOk();
      mostrarToast("Salvo com sucesso!", "ok");
      limparTudoAposSalvar();

    } catch(e) {
      tocarSom("erro"); vibrarErro();
      mostrarToast("Erro ao salvar: " + e.message, "erro");
    } finally {
      btn.disabled = false;
      btn.innerText = "Salvar localização";
    }
  }

  // ===== EVENTOS =====
  document.getElementById("sku").addEventListener("input", () => marcarCampoBusca(""));

  // readOnly no novoLocal: remove ao toque (abre teclado) mas mantém para coletor
  document.getElementById("novoLocal").addEventListener("touchstart", function() {
    this.removeAttribute("readonly");
    this.focus();
  });
  document.getElementById("novoLocal").addEventListener("blur", function() {
    // restaura readOnly quando sai do campo, para próxima bipagem funcionar
    this.setAttribute("readonly", true);
  });

  document.getElementById("usuario").addEventListener("keypress", (e) => {
    if (e.key === "Enter") document.getElementById("senha").focus();
  });

  document.getElementById("senha").addEventListener("keypress", (e) => {
    if (e.key === "Enter") login();
  });

  // ===== SCANNER CÂMERA =====
  let scannerInstance = null;
  let scannerEmUso = false;

  async function abrirScanner() {
    if (scannerEmUso) return;
    if (typeof Html5Qrcode === 'undefined') {
      mostrarToast("Biblioteca do scanner não carregou. Verifique a conexão.", "erro");
      return;
    }

    const modal = document.getElementById("modalScanner");
    const msg   = document.getElementById("scannerMsg");
    modal.classList.add("aberto");
    msg.innerText = "Iniciando câmera...";

    try {
      scannerInstance = new Html5Qrcode("leitorCam", { verbose: false });
      scannerEmUso = true;

      const formatosAceitos = [
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.QR_CODE
      ];

      const config = {
        fps: 10,
        qrbox: { width: 280, height: 140 },
        aspectRatio: 1.333,
        formatsToSupport: formatosAceitos,
        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
      };

      await scannerInstance.start(
        { facingMode: "environment" },
        config,
        onScanSucesso,
        () => {} // ignora "no match" — chamado várias vezes/segundo
      );

      msg.innerText = "Mantenha o código dentro do quadro";
    } catch (e) {
      console.error("[scanner] erro ao iniciar:", e);
      msg.innerText = "Erro ao acessar a câmera: " + (e.message || e);
      mostrarToast("Não foi possível acessar a câmera. Permita o acesso nas configurações.", "erro");
      setTimeout(fecharScanner, 2000);
    }
  }

  function onScanSucesso(codigoLido) {
    if (!scannerEmUso) return;
    scannerEmUso = false; // trava pra evitar disparos múltiplos

    const msg = document.getElementById("scannerMsg");
    msg.innerText = "✓ Código lido: " + codigoLido;

    tocarSom("ok"); vibrarOk();

    const inputSku = document.getElementById("sku");
    inputSku.value = codigoLido.trim();
    marcarCampoBusca("");

    setTimeout(() => {
      fecharScanner();
      buscar();
    }, 400);
  }

  async function fecharScanner() {
    const modal = document.getElementById("modalScanner");
    if (scannerInstance) {
      try {
        const state = scannerInstance.getState && scannerInstance.getState();
        if (state === 2) { // RUNNING
          await scannerInstance.stop();
        }
        await scannerInstance.clear();
      } catch (_) { /* ignora */ }
      scannerInstance = null;
    }
    scannerEmUso = false;
    modal.classList.remove("aberto");
  }

  // Fecha modal se apertar ESC
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && document.getElementById("modalScanner").classList.contains("aberto")) {
      fecharScanner();
    }
  });

  // ===== INIT =====
  if (obterSessao()) aplicarLoginNaTela();
</script>
</body>
